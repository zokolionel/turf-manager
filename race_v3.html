<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Course — Turf Manager France</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0D2B1A;
  display:flex; flex-direction:column; align-items:center;
  min-height:100vh; padding:12px;
  max-width:430px; margin:0 auto;
  font-family:'Georgia',serif; color:white;
}
.race-header {
  width:100%; display:flex; justify-content:space-between; align-items:center;
  background:rgba(0,0,0,0.5); border:1px solid rgba(201,168,76,0.3);
  border-radius:12px; padding:10px 14px; margin-bottom:10px;
}
.race-name { font-size:15px; font-weight:700; color:#E8C96A; }
.race-meta { font-size:11px; color:rgba(255,255,255,0.5); margin-top:2px; }
.race-grade { background:#C9A84C; color:#0D2B1A; font-size:10px; font-weight:800; padding:3px 8px; border-radius:4px; }
.phase-row { width:100%; display:flex; gap:4px; margin-bottom:8px; align-items:center; }
.phase-dot { flex:1; height:3px; border-radius:2px; background:rgba(255,255,255,0.12); transition:all 0.4s; }
.phase-dot.done { background:rgba(201,168,76,0.4); }
.phase-dot.active { background:#C9A84C; box-shadow:0 0 8px #C9A84C; }
.phase-label { font-size:10px; color:rgba(255,255,255,0.5); white-space:nowrap; margin-left:6px; min-width:90px; text-align:right; }
.canvas-wrap { width:100%; border-radius:14px; overflow:hidden; border:1px solid rgba(201,168,76,0.25); position:relative; margin-bottom:10px; box-shadow:0 8px 32px rgba(0,0,0,0.5); }
canvas { display:block; width:100%; }
.comment-box { width:100%; background:rgba(0,0,0,0.45); border-left:3px solid #C9A84C; border-radius:0 8px 8px 0; padding:10px 14px; margin-bottom:10px; min-height:44px; display:flex; align-items:center; }
.comment-text { font-size:13px; color:#E8C96A; font-style:italic; line-height:1.5; }
.live-box { display:none; }  /* classement désormais dessiné dans le canvas (bas-gauche) */
.live-title { font-size:9px; color:rgba(255,255,255,0.35); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:7px; }
.live-runner { display:flex; align-items:center; gap:7px; padding:3px 0; }
.live-num { width:18px; height:18px; border-radius:3px; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:800; flex-shrink:0; }
.live-name { flex:1; font-size:11px; color:rgba(255,255,255,0.75); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.live-pos { font-size:10px; font-weight:700; color:#C9A84C; width:20px; text-align:right; flex-shrink:0; }
.live-bar-bg { width:60px; height:3px; background:rgba(255,255,255,0.08); border-radius:2px; flex-shrink:0; }
.live-bar-fill { height:100%; border-radius:2px; transition:width 0.5s ease; }
.controls { position:absolute; right:8px; bottom:8px; display:flex; gap:6px; z-index:5; }
.btn-speed { background:rgba(0,0,0,0.55); border:1px solid rgba(255,255,255,0.2); border-radius:8px; padding:6px 10px; color:rgba(255,255,255,0.75); font-size:11px; font-weight:700; cursor:pointer; transition:all 0.2s; }
.btn-speed.active { background:rgba(201,168,76,0.85); border-color:#C9A84C; color:#0D2B1A; }
/* ── HUD in-scène (boutons cliquables superposés au canvas, réf. SO-Touch) ──── */
.hud-btn { position:absolute; z-index:6; cursor:pointer; font-weight:800; -webkit-tap-highlight-color:transparent; display:flex; flex-direction:column; align-items:center; justify-content:center; line-height:1; box-shadow:0 2px 8px rgba(0,0,0,0.45); }
.hud-speed { top:10px; left:10px; width:46px; height:46px; border-radius:50%; background:#D32F2F; border:2px solid #fff; color:#fff; font-size:17px; }
.hud-speed small { font-size:9px; font-weight:700; }
.hud-stop { top:10px; right:10px; width:46px; height:46px; border-radius:50%; background:#5A5E66; border:2px solid #fff; color:#fff; font-size:20px; }
.hud-speed:active, .hud-stop:active { transform:scale(0.92); }
.btn-primary { width:100%; background:linear-gradient(135deg,#C9A84C,#A8882A); color:#0D2B1A; border:none; border-radius:10px; padding:14px; font-size:15px; font-weight:800; cursor:pointer; margin-bottom:8px; }
.btn-secondary { width:100%; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.15); color:rgba(255,255,255,0.7); border-radius:10px; padding:12px; font-size:13px; cursor:pointer; }
/* ── HUD : barre de progression de course ──────────────────────────────────── */
.progress-wrap { width:100%; height:5px; background:rgba(255,255,255,0.1); border-radius:3px; margin-bottom:8px; overflow:hidden; }
.progress-fill { height:100%; width:0; background:linear-gradient(90deg,#C9A84C,#E8C96A); transition:width .15s linear; }
/* ── Écran de résultat (overlay sur le canvas) ─────────────────────────────── */
.result { position:absolute; inset:0; background:rgba(8,20,12,0.94); display:none; flex-direction:column; align-items:center; justify-content:center; gap:9px; padding:16px; z-index:10; text-align:center; }
.result.show { display:flex; }
.result-title { font-size:18px; font-weight:800; color:#E8C96A; line-height:1.35; }
.podium { display:flex; align-items:flex-end; gap:10px; margin:4px 0; }
.pod { background:rgba(255,255,255,0.07); border-radius:8px; padding:8px 10px; font-size:11px; min-width:80px; color:#fff; line-height:1.5; }
.pod1 { padding-bottom:24px; border:1px solid #C9A84C; }
.pod2 { padding-bottom:14px; }
.result-player { font-size:13px; color:rgba(255,255,255,0.85); }
.result-money { font-size:15px; font-weight:800; min-height:18px; }
.photo-badge { font-size:11px; letter-spacing:2px; color:#fff; background:#B71C1C; padding:2px 8px; border-radius:4px; }
.btn-continue { background:linear-gradient(135deg,#C9A84C,#A8882A); color:#0D2B1A; border:none; border-radius:10px; padding:11px 26px; font-size:14px; font-weight:800; cursor:pointer; margin-top:4px; }
</style>
</head>
<body>

<div class="race-header">
  <div>
    <div class="race-name">Prix des Poulinieres</div>
    <div class="race-meta">📍 Chantilly • Herbe • 1600m • 10 partants</div>
  </div>
  <div class="race-grade">MAIDEN</div>
</div>

<div class="phase-row">
  <div class="phase-dot" id="ph0"></div>
  <div class="phase-dot" id="ph1"></div>
  <div class="phase-dot" id="ph2"></div>
  <div class="phase-dot" id="ph3"></div>
  <div class="phase-dot" id="ph4"></div>
  <div class="phase-label" id="phase-label">Prêt</div>
</div>

<div class="progress-wrap"><div class="progress-fill" id="prog-fill"></div></div>

<div class="canvas-wrap">
  <canvas id="raceCanvas" width="800" height="380"></canvas>
  <button class="hud-btn hud-speed" id="hud-speed" onclick="cycleSpeed()">»<small>×1</small></button>
  <button class="hud-btn hud-stop" id="hud-stop" title="Terminer la course" onclick="stopRace()">⏻</button>
  <div class="result" id="result">
    <div class="result-title" id="res-title"></div>
    <div class="podium">
      <div class="pod pod2" id="pod2"></div>
      <div class="pod pod1" id="pod1"></div>
      <div class="pod pod3" id="pod3"></div>
    </div>
    <div class="result-player" id="res-player"></div>
    <div class="result-money" id="res-money"></div>
    <button class="btn-continue" id="res-continue">Continuer →</button>
  </div>
</div>

<div class="comment-box">
  <div class="comment-text" id="comment">Appuie sur Lancer pour débuter la course...</div>
</div>

<div class="live-box">
  <div class="live-title">Classement en direct</div>
  <div id="live-list"></div>
</div>

<button class="btn-primary" id="btn-start" onclick="startRace()">🏁 Lancer la course</button>
<button class="btn-secondary" onclick="location.reload()">↺ Rejouer</button>

<!-- Sprites chevaux vectoriels (Path2D, 10 frames @ 22fps). Chargé AVANT le moteur :
     expose drawHorseSprite() + HORSE_META. Fallback drawHorse() si absent. -->
<script src="horse_vector_assets.js"></script>
<script>
const C = document.getElementById('raceCanvas');
const ctx = C.getContext('2d');
const W = C.width, H = C.height;

// ── CONSTANTES ────────────────────────────────────────────────────────────────
// MODÈLE STARTERS ORDERS TOUCH + FOND PHOTO (WebP Midjourney) : le décor occupe le
// haut [0..TRACK_TOP] et défile en PARALLAXE (BG_CONFIG.parallaxFactor) ; la PISTE
// procédurale (herbe/sable + rails) est dessous et défile à 1× (scrollX). Chevaux
// centrés. Bandes (px / fractions de H=380) sous la ligne de séparation :
const TRACK_TOP = 214;   // px : haut de la piste = ligne de séparation sous le fond WebP
const RAIL_U   = 0.58;   // rail intérieur (haut piste, ~220px)
const RACE_TOP = 0.655;  // haut des lanes chevaux (~249px)
const RACE_BOT = 0.895;  // bas des lanes chevaux (~340px)
const RAIL_L   = 0.95;   // rail extérieur (bas piste, ~361px) ; premier plan 0.95..1.0

// ── FOND PHOTO WebP (bloc validé Architecte/Tech) ─────────────────────────────
const BG_CONFIG = {
  parallaxFactor: 0.3,
  drawHeight: TRACK_TOP,                             // 214
  drawWidth: Math.round(TRACK_TOP * (3808 / 1280)),  // ≈637 (ratio source 3808×1280 préservé)
  separatorColor: '#1A3A10',
};

// ── CHEVAUX : centrés. Leader calé à X_LEADER, dernier ≈ 38% (écart ∝ classement) ─
const X_LEADER = 0.60;                  // X écran du cheval de tête
const X_MIN    = 0.34, X_MAX = 0.66;    // bande centrale où évoluent les chevaux
const GAP_PER_POS = 0.011;              // 1 « longueur » de standing (classement, photo-finish)
const GAP_X       = 0.026;              // 1 longueur ≈ 2.6% de largeur (espacement visuel)

// ── 8 FRAMES GALOP (angles membres en degrés, basé Muybridge) ─────────────────
const FRAMES = [
  { fl:-35, fr: 15, rl: 25, rr:-25, spine: 3, neck:18 },
  { fl: -5, fr: 45, rl: 55, rr:  5, spine: 6, neck:22 },
  { fl: 25, fr: 65, rl: 28, rr: 45, spine: 8, neck:26 },
  { fl: 55, fr: 35, rl:  5, rr: 62, spine: 5, neck:20 },
  { fl: 42, fr:-12, rl:-22, rr: 32, spine: 2, neck:15 },
  { fl: 12, fr:-28, rl:-38, rr: 12, spine:-2, neck:10 },
  { fl:-18, fr: -8, rl:-18, rr:-28, spine:-5, neck: 6 },
  { fl:-38, fr:  8, rl:  8, rr:-38, spine:-2, neck:12 },
];

// ── PARTANTS ──────────────────────────────────────────────────────────────────
// Champ par défaut (mode standalone). Le jeu peut le remplacer via ?runners=JSON
// (noms + couleurs + positions finales) et ?pos= (rang final du joueur).
const DEFAULT_RUNNERS = [
  { id:1,  name:'Premier Galop', isPlayer:true,  body:'#1A1A1A', silk:'#E8651A', cap:'#0A0A0A', trim:'#FFFFFF', pos:3  },
  { id:2,  name:'Comete Levant', isPlayer:false, body:'#7B3F00', silk:'#1565C0', cap:'#FFFFFF', trim:'#F9A825', pos:1  },
  { id:3,  name:'Star Royal',    isPlayer:false, body:'#C8A060', silk:'#B71C1C', cap:'#F5F5F5', trim:'#1565C0', pos:5  },
  { id:4,  name:'Eclat Dore',    isPlayer:false, body:'#3E2723', silk:'#6A1B9A', cap:'#F9A825', trim:'#FFFFFF', pos:2  },
  { id:5,  name:'Tonnerre',      isPlayer:false, body:'#8D5524', silk:'#1B5E20', cap:'#FFFFFF', trim:'#F9A825', pos:4  },
  { id:6,  name:'Vaillant',      isPlayer:false, body:'#212121', silk:'#E65100', cap:'#212121', trim:'#FFECB3', pos:6  },
  { id:7,  name:'Diamant Noir',  isPlayer:false, body:'#D7B899', silk:'#00695C', cap:'#212121', trim:'#80CBC4', pos:7  },
  { id:8,  name:'Rafale',        isPlayer:false, body:'#6D4C41', silk:'#C62828', cap:'#F5F5F5', trim:'#C62828', pos:8  },
  { id:9,  name:'Zenith',        isPlayer:false, body:'#37474F', silk:'#0277BD', cap:'#F57F17', trim:'#0277BD', pos:9  },
  { id:10, name:'Mistral',       isPlayer:false, body:'#C4A882', silk:'#AD1457', cap:'#FFFFFF', trim:'#F8BBD9', pos:10 },
];

const RUNNERS = (function () {
  try {
    const raw = new URLSearchParams(location.search).get('runners');
    if (raw) {
      const arr = JSON.parse(raw);
      if (Array.isArray(arr) && arr.length >= 2) {
        const built = arr.map((r, i) => ({
          id:       r.id != null ? r.id : i + 1,
          name:     r.name || ('Cheval ' + (i + 1)),
          isPlayer: !!r.isPlayer,
          body:     r.body || '#6D4C41',
          silk:     r.silk || '#1565C0',
          cap:      r.cap  || '#FFFFFF',
          trim:     r.trim || '#F9A825',
          pos:      r.pos  != null ? r.pos : i + 1,
          odds:     r.odds,
        }));
        if (!built.some(r => r.isPlayer)) built[0].isPlayer = true;   // garantit un joueur
        const posParam = parseInt(new URLSearchParams(location.search).get('pos'), 10);
        if (posParam) { const pl = built.find(r => r.isPlayer); if (pl) pl.pos = posParam; }
        return built;
      }
    }
  } catch (e) { /* JSON invalide → champ par défaut */ }
  return DEFAULT_RUNNERS;
})();

// Cotes (cosmétique HUD classement) : fournie par le jeu (r.odds) sinon dérivée, stable.
RUNNERS.forEach(r => { if (r.odds == null) r.odds = +(2 + ((r.id * 37) % 200) / 10).toFixed(1); });

// Bande verticale RESSERRÉE (vue latérale pure, PAS de diagonale) : les chevaux se
// décalent légèrement en Y (largeur de piste / dépassements) mais restent groupés.
// La profondeur (Y) est attribuée par une PERMUTATION déterministe décorrélée du
// classement → le peloton ne s'aligne jamais en chenille diagonale. Déterministe.
const LANE_T = 0.66, LANE_B = 0.89;             // lanes DANS la piste (sous TRACK_TOP)
const LANE_SLOT = (() => {                       // post-positions mélangées, stables
  const order = RUNNERS.map((r, i) => ({ i, key: ((i * 2654435761) >>> 0) % 100000 }));
  order.sort((a, b) => a.key - b.key);
  const slot = new Array(RUNNERS.length);
  order.forEach((o, rank) => { slot[o.i] = RUNNERS.length > 1 ? rank / (RUNNERS.length - 1) : 0.5; });
  return slot;
})();
const LANES = RUNNERS.map((r, i) =>
  LANE_T + (LANE_B - LANE_T) * LANE_SLOT[i] + (((i * 67) % 13 - 6) * 0.0006)   // micro-jitter
);

// Y ANIMÉ (CHANTIER 2) : `_y` = position verticale courante (lerp vers une lane cible).
// Le z-order n'utilise PLUS de lane fixe — il est trié par `_y` chaque frame (CHANTIER 3).
const LANE_CENTER = (LANE_T + LANE_B) / 2;
const LANE_H = (LANE_B - LANE_T) / Math.max(1, RUNNERS.length - 1);
// _y (lane animée) + frame de galop sprite (désync : offset aléatoire 0..nframes-1).
RUNNERS.forEach((r, i) => {
  r._y = LANES[i];
  r.frame = (typeof HORSE_META !== 'undefined') ? Math.floor(Math.random() * HORSE_META.nframes) : 0;
  r.frameTimer = 0;
});

// ── STANDINGS & CAMÉRA (side-scroller SO-Touch) ──────────────────────────────
// Caméra fixe : les chevaux restent dans une bande centrée, c'est le fond qui
// défile (bgOff). La position EN COURSE est un scalaire pur et déterministe
// dérivé de .pos → ?frame reproductible et .pos reste le résultat.
// shuffle : brassage doux début/milieu qui s'annule vers p=0.85 (ordre final=.pos).
function runnerS(r, p) {
  const lag     = (r.pos - 1) * GAP_PER_POS;          // espacement par rang
  const open    = Math.min(1, p * 3);                 // groupés au départ puis s'écartent
  const settle  = Math.max(0, 1 - p / 0.85);          // 1 au départ → 0 à p=0.85
  const shuffle = Math.sin(p * 6.0 + r.id * 1.7) * 0.5 * GAP_PER_POS * settle;
  return Math.max(0, p - lag * open + shuffle);
}

let _leaderS = 0;                                     // cache : recalculé 1×/frame
function leaderS(p) {
  let m = 0;
  for (const r of RUNNERS) { const v = runnerS(r, p); if (v > m) m = v; }
  return m;
}

// Position X écran : caméra-travelling SO-Touch. Le décor défile (scrollX), les
// chevaux restent centrés. Le leader est calé à X_LEADER (60%) ; chaque suivant est
// en retrait proportionnel à son écart en longueurs → le dernier ≈ 38%.
function runnerXPct(r, p) {
  const ls = (p === progress) ? _leaderS : leaderS(p);
  const gap = (ls - runnerS(r, p)) / GAP_PER_POS;            // écart en longueurs, ≥0
  const x = X_LEADER - gap * GAP_X;
  return Math.max(X_MIN, Math.min(X_MAX, x));
}

// Effet virage : intensité 0..1
function cornerAmt(p) {
  function bell(c, w) { return Math.exp(-Math.pow((p - c) / w, 2)); }
  return bell(0.22, 0.09) * 0.9 + bell(0.72, 0.09) * 0.9;
}

// depth 0 = fond (haut, petit, sombre) .. 1 = proche (bas, grand, clair).
// Mappe la BANDE des lanes [LANE_T..LANE_B] sur [0..1] → vrai contraste de taille.
function laneDepth(yPct) {
  return Math.max(0, Math.min(1, (yPct - LANE_T) / (LANE_B - LANE_T)));
}

// CHANTIER 2 — lane Y CIBLE d'un cheval (déterministe). Début : resserrement vers le
// centre. En course : légères oscillations ±~1 lane. Sprint final : les bien classés
// (rank 0..2) cherchent la corde (lane intérieure = haut). renderFrame lerp vers ça.
function targetLaneY(r, i, p, rank) {
  const base = LANES[i];
  const conv = Math.max(0, 1 - p / 0.15);                       // 1 au départ → 0 à p=0.15
  let y = base + (LANE_CENTER - base) * conv * 0.55;            // resserrement initial
  y += Math.sin(p * 6.5 + r.id * 1.7) * LANE_H * 0.9 * (1 - conv); // oscillations en course
  if (p > 0.85) {                                               // sprint : recherche de corde
    const pull = Math.max(0, 1 - rank / 3) * (p - 0.85) / 0.15;
    y += ((LANE_T + LANE_H * 0.5) - y) * pull * 0.6;
  }
  return Math.max(LANE_T, Math.min(LANE_B, y));
}

// ── DESSIN CHEVAL ─────────────────────────────────────────────────────────────
function shade(hex, d) {
  let n = parseInt(hex.replace('#',''), 16);
  let r = Math.max(0,Math.min(255,(n>>16)+d));
  let g = Math.max(0,Math.min(255,((n>>8)&255)+d));
  let b = Math.max(0,Math.min(255,(n&255)+d));
  return '#'+((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');
}

// Mélange linéaire de deux couleurs hex (t=0 → a, t=1 → b). Pour le depth fog.
function mix(a, b, t) {
  const pa = parseInt(a.slice(1), 16), pb = parseInt(b.slice(1), 16);
  const ar = (pa>>16)&255, ag = (pa>>8)&255, ab = pa&255;
  const br = (pb>>16)&255, bg = (pb>>8)&255, bb = pb&255;
  const r = Math.round(ar + (br-ar)*t), g = Math.round(ag + (bg-ag)*t), bl = Math.round(ab + (bb-ab)*t);
  return '#'+(((r<<16)|(g<<8)|bl)>>>0).toString(16).padStart(6,'0');
}

function drawLeg(x, y, angle, len, col, w, s) {
  const a = angle * Math.PI / 180;
  const kx = x + Math.sin(a) * len * 0.5;
  const ky = y + Math.cos(a) * len * 0.5;
  // Cuisse
  ctx.strokeStyle = col;
  ctx.lineWidth = w * s;
  ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(kx, ky); ctx.stroke();
  // Canon (légèrement différent)
  const a2 = (angle + angle * 0.15) * Math.PI / 180;
  const ex = kx + Math.sin(a2) * len * 0.55;
  const ey = ky + Math.cos(a2) * len * 0.55;
  ctx.lineWidth = w * s * 0.75;
  ctx.beginPath(); ctx.moveTo(kx, ky); ctx.lineTo(ex, ey); ctx.stroke();
  // Articulation marquée (boulet / jarret)
  ctx.fillStyle = col;
  ctx.beginPath(); ctx.arc(kx, ky, w * s * 0.7, 0, Math.PI*2); ctx.fill();
  // Sabot (gris sombre)
  ctx.fillStyle = '#2A2A2A';
  ctx.beginPath();
  ctx.ellipse(ex, ey, 2.8*s, 1.7*s, a2, 0, Math.PI*2);
  ctx.fill();
}

// ── SpriteManager : infra de sprites PNG (DORMANTE tant que les PNG sont absents) ──
// Si horse_base.png / jockey_base.png n'existent pas → isLoaded reste false et le rendu
// VECTORIEL (drawHorse, ci-dessous) reste le fallback par défaut. (Validé Architecte/Tech.)
class SpriteManager {
  constructor() {
    this.horseSheet = new Image();
    this.jockeyBaseSheet = new Image();
    this.isLoaded = false;
    this.jockeyCache = {};
    this.frameWidth = 200;
    this.frameHeight = 150;
  }

  init(horseSrc, jockeySrc) {
    return new Promise((resolve) => {
      let loadedCount = 0;
      const checkLoad = () => {
        loadedCount++;
        if (loadedCount === 2) {
          this.isLoaded = true;
          resolve();
        }
      };
      this.horseSheet.onload = checkLoad;
      this.jockeyBaseSheet.onload = checkLoad;
      this.horseSheet.onerror = () => { this.isLoaded = false; };
      this.jockeyBaseSheet.onerror = () => { this.isLoaded = false; };
      this.horseSheet.src = horseSrc;
      this.jockeyBaseSheet.src = jockeySrc;
    });
  }

  generateJockeyCache(horseId, hexColor) {
    const c = document.createElement('canvas');
    c.width = this.jockeyBaseSheet.width;
    c.height = this.jockeyBaseSheet.height;
    const o = c.getContext('2d');
    o.drawImage(this.jockeyBaseSheet, 0, 0);
    o.globalCompositeOperation = 'source-atop';
    o.fillStyle = hexColor;
    o.fillRect(0, 0, c.width, c.height);
    this.jockeyCache[horseId] = c;
  }

  renderSprite(ctx, horseId, frameIndex, targetX, targetY, scale, fogAlpha = 0) {
    if (!this.isLoaded) return;
    const sourceX = frameIndex * this.frameWidth;
    const dWidth = this.frameWidth * scale;
    const dHeight = this.frameHeight * scale;
    ctx.save();
    ctx.translate(targetX, targetY);
    ctx.scale(-1, 1);
    const drawX = -dWidth / 2;
    const drawY = -dHeight / 2;
    ctx.drawImage(this.horseSheet, sourceX, 0,
      this.frameWidth, this.frameHeight, drawX, drawY, dWidth, dHeight);
    const tinted = this.jockeyCache[horseId];
    if (tinted) {
      ctx.drawImage(tinted, sourceX, 0,
        this.frameWidth, this.frameHeight, drawX, drawY, dWidth, dHeight);
    }
    if (fogAlpha > 0) {
      ctx.globalCompositeOperation = 'source-atop';
      ctx.fillStyle = `rgba(0,0,0,${fogAlpha})`;
      ctx.fillRect(drawX, drawY, dWidth, dHeight);
    }
    ctx.restore();
  }
}

// adjustColorBrightness(hex, percent) : éclaircit (percent>0, vers blanc) ou assombrit
// (percent<0, vers noir) en %. Base du flat shading 3 tons.
function adjustColorBrightness(hex, percent) {
  const n = parseInt(hex.replace('#', ''), 16);
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255, f = percent / 100;
  const ch = v => Math.max(0, Math.min(255, Math.round(f >= 0 ? v + (255 - v) * f : v * (1 + f))));
  return '#' + (((ch(r) << 16) | (ch(g) << 8) | ch(b)) >>> 0).toString(16).padStart(6, '0');
}

// Cycle galop Muybridge 8 frames. Convention (espace local, tête en -x) : membre AVANT
// angle<0 = tendu vers l'avant, >0 = replié sous le ventre ; membre ARRIÈRE angle>0 =
// tendu vers l'arrière (propulsion), <0 = engagé sous le ventre. SEULS changent par
// frame : angles membres (fl/fr/rl/rr), bob (oscillation verticale), tail (inclinaison
// queue : haute=valeur basse en propulsion, basse=valeur haute en extension).
function gallopFrame(fi) {
  switch (fi) {
    case 0:  return { fl:-48, fr:-38, rl: 52, rr: 60, bob: 5, tail: 0.50 }; // extension maximale
    case 1:  return { fl: 18, fr: -8, rl: 30, rr: 42, bob: 0, tail: 0.42 }; // réception antérieur droit
    case 2:  return { fl: 35, fr: 12, rl:  5, rr: 22, bob:-3, tail: 0.32 }; // appui monopodal
    case 3:  return { fl: 42, fr: 28, rl:-28, rr:-12, bob:-5, tail: 0.18 }; // engagement postérieurs
    case 4:  return { fl: 20, fr: 30, rl:-30, rr:-20, bob:-2, tail: 0.10 }; // regroupement (sous le ventre)
    case 5:  return { fl:-12, fr:  8, rl: 36, rr: 22, bob: 2, tail:-0.05 }; // propulsion initiale
    case 6:  return { fl:-30, fr:-16, rl: -6, rr: 14, bob: 8, tail:-0.12 }; // suspension (aucun appui)
    default: return { fl:-44, fr:-30, rl: 44, rr: 50, bob: 6, tail: 0.30 }; // retour vers extension
  }
}

// Crochet FUTUR pour les motifs de casaque (rayures, étoiles…). VIDE pour l'instant :
// pas de clip() (coûteux en boucle mobile). À activer quand les motifs seront requis.
function drawJockeyPattern(/* ctx, silk, trim, s */) { /* no-op */ }

// drawHorse : rendu vectoriel FLAT DESIGN (3 tons / robe), orienté vers la DROITE.
// Signature CONSERVÉE. Membres dessinés en 2 passes (fond shadow → avant base) pour la
// profondeur. fog = voile de profondeur ; s = scale de profondeur ; fi = compteur frame.
function drawHorse(cx, cy, s, fi, body, silk, cap, trim, isPlayer, motionBlur, fog, tilt) {
  const frameIndex = Math.floor(fi) % 8;
  const pose = gallopFrame(frameIndex);

  // Depth fog : on assombrit les COPIES locales des couleurs (jamais r.silk du HUD).
  if (fog > 0.01) {
    body = mix(body, '#0A1622', fog);
    silk = mix(silk, '#0A1622', fog * 0.7);
    cap  = mix(cap,  '#0A1622', fog * 0.7);
  }
  const coat = {                                 // 3 tons par robe
    base:      body,
    shadow:    adjustColorBrightness(body, -25),
    highlight: adjustColorBrightness(body,  20),
  };
  const legLen = 23 * s;

  ctx.save();
  ctx.translate(cx, cy);
  if (tilt) ctx.rotate(tilt);                    // inclinaison virage (pivot = centre)
  ctx.scale(-1, 1);                              // sprite dessiné tête-à-gauche → orienté DROITE
  ctx.translate(0, pose.bob * s * 0.5);          // bobYOffset : oscillation verticale du corps
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';

  // ── 1. MEMBRES DU FOND (côté opposé, ton shadow, articulations marquées) ─────
  drawLeg(-13*s, 3*s, pose.fr, legLen, coat.shadow, 2.3, s);     // antérieur fond
  drawLeg( 13*s, 3*s, pose.rr, legLen, coat.shadow, 2.6, s);     // postérieur fond

  // ── 2. QUEUE (brosse fluide, inclinaison selon frame : basse en extension, haute
  //      en propulsion via pose.tail) ──────────────────────────────────────────
  ctx.save();
  ctx.translate(21*s, -4*s); ctx.rotate(pose.tail);
  ctx.fillStyle = adjustColorBrightness(body, -38);
  ctx.beginPath();
  ctx.moveTo(0, -2*s);
  ctx.quadraticCurveTo(11*s, 7*s, 7*s, 22*s);
  ctx.quadraticCurveTo(3*s, 14*s, -2*s, 4*s);
  ctx.closePath(); ctx.fill();
  ctx.restore();

  // ── 3. TRONC + ENCOLURE LONGUE (base, ligne du dessus tendue) ────────────────
  ctx.fillStyle = coat.base;
  ctx.beginPath();                               // encolure longue (garrot → nuque)
  ctx.moveTo(-12*s, -6*s);
  ctx.quadraticCurveTo(-24*s, -11*s, -30*s, -22*s);
  ctx.lineTo(-25*s, -25*s);
  ctx.quadraticCurveTo(-16*s, -15*s, -6*s, -7*s);
  ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.ellipse(  0*s,  1*s, 18*s,  9*s, 0, 0, Math.PI*2); ctx.fill();  // barrel
  ctx.beginPath(); ctx.ellipse( 12*s, -2*s, 11*s, 10*s, 0, 0, Math.PI*2); ctx.fill();  // croupe
  ctx.beginPath(); ctx.ellipse(-13*s,  0*s,  9*s,  8*s, 0, 0, Math.PI*2); ctx.fill();  // épaule

  // ── 4. OMBRES MUSCULAIRES (aplats shadow) ────────────────────────────────────
  ctx.fillStyle = coat.shadow;
  ctx.beginPath(); ctx.ellipse(  2*s, 6*s, 14*s, 4*s, 0, 0, Math.PI*2); ctx.fill();    // flanc sous selle
  ctx.beginPath(); ctx.ellipse(  8*s, 4*s,  7*s, 6*s, 0, 0, Math.PI*2); ctx.fill();    // pli cuisse
  ctx.beginPath(); ctx.ellipse(-15*s, 3*s,  5*s, 6*s, 0, 0, Math.PI*2); ctx.fill();    // omoplate

  // ── 5. LUMIÈRES MUSCULAIRES (aplats highlight) ───────────────────────────────
  ctx.fillStyle = coat.highlight;
  ctx.beginPath(); ctx.ellipse(13*s, -7*s, 8*s, 4*s, 0, 0, Math.PI*2); ctx.fill();     // haut croupe
  ctx.beginPath(); ctx.ellipse(-3*s, -6*s, 12*s, 3*s, 0, 0, Math.PI*2); ctx.fill();    // dos (sheen)
  ctx.save(); ctx.translate(-22*s, -18*s); ctx.rotate(-0.72);
  ctx.beginPath(); ctx.ellipse(0, 0, 8*s, 2*s, 0, 0, Math.PI*2); ctx.fill();           // galbe encolure
  ctx.restore();

  // ── 6. TÊTE + CRINIÈRE EN MÈCHES (profil affiné, oreilles couchées) ──────────
  ctx.fillStyle = adjustColorBrightness(body, -44);                                    // crinière en mèches
  for (let m = 0; m < 5; m++) {
    const t = m / 4, mx = (-8 + (-29 - (-8)) * t) * s, my = (-9 + (-23 - (-9)) * t) * s;
    ctx.beginPath(); ctx.moveTo(mx, my); ctx.lineTo(mx + 3*s, my - 2*s); ctx.lineTo(mx + 1*s, my + 2*s); ctx.closePath(); ctx.fill();
  }
  ctx.save();
  ctx.translate(-30*s, -22*s);                   // bout de l'encolure longue
  ctx.fillStyle = coat.base;                     // chanfrein / tête (profil)
  ctx.beginPath();
  ctx.moveTo(2*s, -3*s);
  ctx.quadraticCurveTo(-3*s, -2*s, -7*s, 3*s);
  ctx.quadraticCurveTo(-9*s, 6*s, -7*s, 8*s);
  ctx.quadraticCurveTo(-2*s, 8*s, 3*s, 5*s);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = adjustColorBrightness(body, -30);                                    // naseau marqué
  ctx.beginPath(); ctx.ellipse(-7*s, 6*s, 1.7*s, 1.2*s, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = coat.shadow;                   // oreilles couchées (effort)
  ctx.beginPath(); ctx.moveTo(2*s,-2*s); ctx.lineTo(9*s,-5*s); ctx.lineTo(4*s,1*s); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(1*s,-1*s); ctx.lineTo(8*s,-2*s); ctx.lineTo(3*s,2*s); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#0D0D0D';                     // œil
  ctx.beginPath(); ctx.arc(-1*s, 1*s, 1.4*s, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // ── 7. MEMBRES AVANT (côté proche, base + surbrillance canon/genou) ──────────
  drawLeg(-15*s, 4*s, pose.fl, legLen, coat.base, 2.8, s);       // antérieur proche
  drawLeg( 11*s, 4*s, pose.rl, legLen, coat.base, 3.0, s);       // postérieur proche
  {                                              // surbrillance canon de l'antérieur proche
    const fa = pose.fl * Math.PI / 180;
    const kx = -15*s + Math.sin(fa) * legLen * 0.5, ky = 4*s + Math.cos(fa) * legLen * 0.5;
    ctx.strokeStyle = coat.highlight; ctx.lineWidth = 1*s;
    ctx.beginPath(); ctx.moveTo(-15*s, 4*s); ctx.lineTo(kx, ky); ctx.stroke();
  }

  // ── 8. HARNACHEMENT (tapis de selle couleur jockey + selle fine noire + rênes)
  ctx.fillStyle = silk;                          // tapis de selle (rappel couleur jockey)
  ctx.beginPath(); ctx.ellipse(-6*s, -6*s, 8*s, 3.4*s, -0.05, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#15110E';                     // selle fine de course
  ctx.beginPath(); ctx.ellipse(-7*s, -7.6*s, 5.4*s, 2.5*s, -0.06, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(20,16,12,0.85)'; ctx.lineWidth = 1.5;                         // rênes tendues
  ctx.beginPath(); ctx.moveTo(-9*s, -8*s); ctx.quadraticCurveTo(-22*s, -11*s, -29*s, -16*s); ctx.stroke();

  // ── 9. JOCKEY EN SUSPENSION (buste très bas ∥ encolure, fesses en arrière,
  //      genoux très fléchis vers l'avant) ─────────────────────────────────────
  ctx.save();
  ctx.translate(-7*s, -10*s);
  ctx.rotate(-0.55);                             // presque parallèle à l'encolure
  ctx.strokeStyle = '#F5EFDF'; ctx.lineWidth = 3.4*s;                                  // cuisse (pantalon crème) vers l'avant
  ctx.beginPath(); ctx.moveTo(2*s, 1*s); ctx.lineTo(-4*s, 2*s); ctx.stroke();
  ctx.strokeStyle = '#111'; ctx.lineWidth = 3*s;                                       // botte noire haute, genou fléchi
  ctx.beginPath(); ctx.moveTo(-4*s, 2*s); ctx.quadraticCurveTo(-6*s, 5*s, -3*s, 7*s); ctx.stroke();
  ctx.fillStyle = '#F5EFDF';                     // fesses en arrière (au-dessus de la selle)
  ctx.beginPath(); ctx.ellipse(3*s, -1*s, 3.5*s, 3*s, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = silk;                          // casaque (APLAT SIMPLE), basse et tendue
  ctx.beginPath(); ctx.ellipse(-3*s, -3*s, 5.5*s, 4*s, -0.35, 0, Math.PI*2); ctx.fill();
  drawJockeyPattern();                           // crochet futur (no-op)
  ctx.strokeStyle = silk; ctx.lineWidth = 2.2*s;                                       // bras vers les rênes
  ctx.beginPath(); ctx.moveTo(-6*s, -2*s); ctx.quadraticCurveTo(-11*s, 0, -15*s, -1*s); ctx.stroke();
  ctx.translate(-8*s, -6*s); ctx.rotate(0.2);                                          // casque rond incliné
  ctx.fillStyle = cap;
  ctx.beginPath(); ctx.arc(0, 0, 3.8*s, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = shade(cap, -22); ctx.fillRect(-4.6*s, 0, 5*s, 1.5*s);                // visière
  ctx.fillStyle = 'rgba(255,235,140,0.65)';                                            // goggles
  ctx.beginPath(); ctx.ellipse(-2.6*s, -0.2*s, 1.7*s, 1*s, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  ctx.restore();
}

// (_drawHorseBody supprimé : son rendu est désormais intégré dans drawHorse ci-dessus.)

// Sprite vectoriel (horse_vector_assets.js) + depth fog en source-atop APRÈS le draw,
// dans un buffer offscreen réutilisé → le voile ne teinte QUE les pixels du cheval (pas
// le décor). fog négligeable (chevaux de devant) = draw direct, sans buffer.
let _fogCv = null, _fogCx = null;
function drawHorseFogged(px, hoofY, sc, frame, body, silk, fog) {
  if (fog <= 0.03) { drawHorseSprite(ctx, px, hoofY, sc, frame, body, silk); return; }
  if (!_fogCv) { _fogCv = document.createElement('canvas'); _fogCv.width = 320; _fogCv.height = 220; _fogCx = _fogCv.getContext('2d'); }
  const ax = HORSE_META.anchorX * sc, ay = HORSE_META.anchorY * sc;
  _fogCx.setTransform(1, 0, 0, 1, 0, 0);
  _fogCx.clearRect(0, 0, _fogCv.width, _fogCv.height);
  drawHorseSprite(_fogCx, ax, ay, sc, frame, body, silk);          // ancre (ax,ay) dans le buffer
  _fogCx.globalCompositeOperation = 'source-atop';
  _fogCx.fillStyle = `rgba(8,16,28,${fog})`;
  _fogCx.fillRect(0, 0, _fogCv.width, _fogCv.height);
  _fogCx.globalCompositeOperation = 'source-over';
  ctx.drawImage(_fogCv, px - ax, hoofY - ay);                       // (ax,ay) → (px,hoofY)
}

// ── FOND DÉFILANT (réf. Starters Orders Touch) : voir drawBg / scrollX ────────
// Discipline → herbe (plat/obstacle/défaut) ou sable (trot/Vincennes). Plus de PNG.
function pickDiscipline() {
  const raw = (new URLSearchParams(location.search).get('discipline')
            || new URLSearchParams(location.search).get('disc') || '').toLowerCase();
  if (raw.includes('plat')) return 'plat';
  if (raw.includes('trot')) return 'trot';
  if (raw.includes('obst')) return 'obstacle';
  return 'default';
}
const DISCIPLINE = pickDiscipline();
const IS_SAND = DISCIPLINE === 'trot';       // Vincennes = sable

// SWITCH HIPPODROME → fond photo WebP Midjourney.
const BG_SRC = DISCIPLINE === 'plat'     ? 'bg_longchamp.png.webp'
             : DISCIPLINE === 'obstacle' ? 'bg_auteuil.png.webp'
             : DISCIPLINE === 'trot'     ? 'bg_vincennes.png.webp'   // attelé / monté
             :                             'bg_chantilly.png.webp';  // défaut
let bgReady = false;
let __afterBg = null;                          // re-render de l'état figé une fois l'image prête
const bgImage = new Image();
bgImage.onload  = () => { bgReady = true; window.__BG_LOADED = true; if (typeof __afterBg === 'function') __afterBg(); };
bgImage.onerror = () => { window.__BG_ERR = bgImage.src; };           // piste procédurale dessine quand même
bgImage.src = BG_SRC;

// Distance de course (HUD « distance restante ») : ?distance=1600m
const RACE_DIST = (() => {
  const d = parseInt(new URLSearchParams(location.search).get('distance'), 10);
  return d > 0 ? d : 1600;
})();

// Palette des bandes selon la surface. sky = ciel gris-bleu statique (réf. SO-Touch).
const COL = IS_SAND
  ? { sky:'#7A8B7B', tree:'#6E7A52', race:'#C8A96E', race2:'#BB9A5C', fg:'#A8895A', fg2:'#977A4D' } // sable (trot)
  : { sky:'#7A8B7B', tree:'#2F6B26', race:'#4D8A2B', race2:'#3A7A1A', fg:'#2E5413', fg2:'#24450F' };// herbe

// drawBg : fond photo WebP (haut, parallaxe) + PISTE procédurale (bas, scrollX 1×).
// PAS de clearRect ici — renderFrame() gère le clear.
function drawBg() {
  // 1. FOND PHOTO [0..TRACK_TOP] : tuiles répétées qui défilent en parallaxe (0.3×).
  if (bgReady) {
    let currentX = -(((scrollX * BG_CONFIG.parallaxFactor) % BG_CONFIG.drawWidth + BG_CONFIG.drawWidth) % BG_CONFIG.drawWidth);
    while (currentX < W) {
      ctx.drawImage(bgImage, currentX, 0, BG_CONFIG.drawWidth, BG_CONFIG.drawHeight);
      currentX += BG_CONFIG.drawWidth;
    }
    ctx.beginPath();                                   // ligne de séparation fond / piste
    ctx.moveTo(0, BG_CONFIG.drawHeight); ctx.lineTo(W, BG_CONFIG.drawHeight);
    ctx.strokeStyle = BG_CONFIG.separatorColor; ctx.lineWidth = 1; ctx.stroke();
  }

  // 2. PISTE [TRACK_TOP..H] : herbe/sable, bandes de tonte 2 tons défilantes + bruit.
  ctx.fillStyle = COL.race; ctx.fillRect(0, TRACK_TOP, W, H * RAIL_L - TRACK_TOP);
  drawGrassStripes(TRACK_TOP, H * RAIL_L, COL.race, COL.race2);

  // 3. PREMIER PLAN [RAIL_L..H] : mêmes bandes plus foncées + ombre de séparation.
  ctx.fillStyle = COL.fg; ctx.fillRect(0, H * RAIL_L, W, H * (1 - RAIL_L));
  drawGrassStripes(H * RAIL_L, H, COL.fg, COL.fg2);
  const sep = ctx.createLinearGradient(0, H * RAIL_L, 0, H * RAIL_L + 14);
  sep.addColorStop(0, 'rgba(0,0,0,0.30)'); sep.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = sep; ctx.fillRect(0, H * RAIL_L, W, 14);

  // RAILS : barre blanche épaisse + ombre portée + poteaux 120px (défilent).
  drawRail(H * RAIL_U);
  drawRail(H * RAIL_L);
}

// Ciel STATIQUE : nuages à position fixe (le ciel ne défile pas).
function drawClouds() {
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  const cl = [[110,30,40,13],[330,22,54,16],[520,40,34,12],[700,26,48,15],[840,46,30,10]];
  cl.forEach(([cx, cy, rx, ry]) => {
    ctx.beginPath(); ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx + rx*0.7, cy + 4, rx*0.6, ry*0.8, 0, 0, Math.PI*2); ctx.fill();
  });
}

// Haie d'arbres à l'horizon qui DÉFILE (tuile ~26px, motif stable en world-space).
function drawTreeline(baseY) {
  ctx.fillStyle = COL.tree;
  const step = 26, start = -(((scrollX % step) + step) % step);
  for (let x = start - step; x < W + step; x += step) {
    const wi = Math.round((x + scrollX) / step);
    const h = 13 + (((wi * 7) % 9 + 9) % 9) * 2;     // 13..29
    ctx.beginPath(); ctx.arc(x, baseY, h, Math.PI, 0); ctx.fill();
  }
  ctx.fillRect(0, baseY - 2, W, 5);                    // base pleine (pas de trous)
}

// Bruit granuleux de piste : tuile 80×80 déterministe construite 1× (CanvasPattern).
let _noisePat = null;
function noisePattern() {
  if (_noisePat) return _noisePat;
  const t = document.createElement('canvas'); t.width = 80; t.height = 80;
  const tc = t.getContext('2d');
  for (let i = 0; i < 1500; i++) {
    const x = (i * 73) % 80, y = (i * 137) % 80, v = (i * 911) % 100;   // déterministe
    tc.fillStyle = v < 55 ? 'rgba(0,0,0,0.06)' : 'rgba(255,255,255,0.045)';
    tc.fillRect(x, y, 1, 1);
  }
  _noisePat = ctx.createPattern(t, 'repeat');
  return _noisePat;
}

// Herbe/sable défilant : bandes de tonte alternées (2 tons, 40px) + bruit granuleux.
function drawGrassStripes(yTop, yBot, base, alt) {
  const band = 40, period = band * 2;
  const shift = ((scrollX % period) + period) % period;
  ctx.fillStyle = alt;                                  // 2e ton (1er ton = fond déjà peint)
  for (let x = -shift - period; x < W + period; x += period) ctx.fillRect(x, yTop, band, yBot - yTop);
  ctx.save();                                           // bruit qui défile avec scrollX
  ctx.translate(-(((scrollX % 80) + 80) % 80), 0);
  ctx.fillStyle = noisePattern();
  ctx.fillRect(0, yTop, W + 80, yBot - yTop);
  ctx.restore();
}

// Tribune (BONUS) : apparaît à progress > 0.85, entre par la droite et DÉFILE avec le
// décor (vitesse = scrollX, ancrée au monde via _standAnchor). Large → couvre l'arrivée.
function drawGrandstand(horizonY) {
  if (progress < 0.85 || _standAnchor === null) return;
  const gw = W * 1.3, gx = W - (scrollX - _standAnchor);   // 1:1 avec scrollX → même vitesse
  if (gx > W) return;                                       // pas encore entrée
  const roofY = horizonY - H * 0.12, bodyY = roofY + H * 0.045, botY = horizonY;
  ctx.save();
  ctx.fillStyle = '#9498A0'; ctx.fillRect(gx, bodyY, gw, botY - bodyY);   // corps gradins
  ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 1;                // marches
  for (let r = 1; r < 4; r++) { const ly = bodyY + (botY - bodyY) * r / 4; ctx.beginPath(); ctx.moveTo(gx, ly); ctx.lineTo(gx + gw, ly); ctx.stroke(); }
  ctx.fillStyle = 'rgba(0,0,0,0.08)';                                     // piliers
  for (let x = gx; x < gx + gw; x += 60) ctx.fillRect(x, bodyY, 3, botY - bodyY);
  ctx.fillStyle = '#6F737B'; ctx.fillRect(gx, roofY, gw, bodyY - roofY + 2);   // toit
  ctx.fillStyle = '#5C6068'; ctx.fillRect(gx, roofY, gw, 4);
  const crowd = ['#C44','#46C','#CC4','#4B8','#EEE','#C8A','#E91','#9C4']; // foule stylisée
  ctx.globalAlpha = 0.7;
  for (let i = 0; i < 240; i++) {
    const cxp = gx + ((i * 53) % gw), cyp = bodyY + 2 + ((i * 29) % Math.max(4, botY - bodyY - 4));
    ctx.fillStyle = crowd[i % crowd.length]; ctx.fillRect(cxp, cyp, 2, 2);
  }
  ctx.restore();
}

// Rail : poteaux (20px, sommet arrondi) tous les 120px qui défilent + barre blanche
// épaisse (8px) avec ombre portée. Strictement horizontal.
function drawRail(y) {
  const tile = 120, off = ((scrollX % tile) + tile) % tile;
  ctx.fillStyle = '#D8D8D8';                            // poteaux (derrière la barre)
  for (let x = -off; x <= W + tile; x += tile) {
    ctx.beginPath(); ctx.roundRect(x - 2, y - 20, 4, 22, [2, 2, 0, 0]); ctx.fill();
  }
  ctx.fillStyle = 'rgba(0,0,0,0.18)'; ctx.fillRect(0, y + 4, W, 3);      // ombre portée
  ctx.fillStyle = '#F2F2F2'; ctx.fillRect(0, y - 4, W, 8);               // barre blanche 8px
  ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.fillRect(0, y - 4, W, 2);// liseré clair
}

// Ligne d'arrivée : poteau + damier vertical qui DÉFILE depuis la droite dans les
// derniers mètres (réf. SO-Touch) et passe les chevaux centrés au poteau (p≈1).
function drawFinishLine(fx) {
  const top = RAIL_U * H, bot = RAIL_L * H, sq = 10;
  for (let y = top, i = 0; y < bot; y += sq, i++) {
    ctx.fillStyle = i % 2 ? '#fff' : '#111';
    ctx.fillRect(fx - 4, y, 8, sq);
  }
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(fx, top - H * 0.07); ctx.lineTo(fx, bot); ctx.stroke();
  ctx.fillStyle = '#C9A84C';                        // fanion
  ctx.beginPath();
  ctx.moveTo(fx, top - H * 0.07); ctx.lineTo(fx + 16, top - H * 0.055); ctx.lineTo(fx, top - H * 0.04);
  ctx.closePath(); ctx.fill();
}

// Stalles de départ : calées au centre au départ, elles reculent avec le décor.
function drawStartGates(p) {
  const gx = X_LEADER * W - scrollX;                 // recule vers la gauche avec le sol
  if (gx < -30) return;
  ctx.save();
  ctx.strokeStyle = 'rgba(240,240,245,0.95)'; ctx.lineWidth = 2;
  for (let i = 0; i < RUNNERS.length; i++) {
    const y = LANES[i] * H, sc = 0.7 + laneDepth(LANES[i]) * 0.3;
    ctx.strokeRect(gx - 7*sc, y - 17*sc, 14*sc, 32*sc);
    ctx.beginPath(); ctx.moveTo(gx - 7*sc, y - 17*sc); ctx.lineTo(gx + 7*sc, y - 17*sc); ctx.stroke();
  }
  ctx.restore();
}

// ── PARTICULES DE POUSSIÈRE ──────────────────────────────────────────────────
const dustParticles = [];
function spawnDust(x, y, color) {
  for (let i = 0; i < 2; i++) {
    dustParticles.push({
      x, y: y + (Math.random() - 0.5) * 6,
      vx: -(1 + Math.random() * 2),
      vy: -(0.5 + Math.random()),
      r: 1.5 + Math.random() * 2.5,
      alpha: 0.4 + Math.random() * 0.3,
      color,
    });
  }
}
function updateDust() {
  for (let i = dustParticles.length - 1; i >= 0; i--) {
    const d = dustParticles[i];
    d.x += d.vx; d.y += d.vy; d.vy += 0.05;
    d.r  *= 1.04; d.alpha *= 0.88;
    if (d.alpha < 0.02) { dustParticles.splice(i, 1); continue; }
    ctx.fillStyle = `rgba(180,140,60,${d.alpha})`;
    ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2); ctx.fill();
  }
}

// ── ÉTAT COURSE ───────────────────────────────────────────────────────────────
let progress = 0, gameSpeed = 1, raceRunning = false, raceEnded = false;
let lastTime = 0, frameCount = 0, scrollX = 0, _boost = 0;  // scrollX = défilement du décor (px)
let STATIC_FRAME = false, _standAnchor = null;              // rendu figé ?frame ; ancre tribune (scrollX)
const BASE_SCROLL = 430;                                     // vitesse de défilement de base (px/s)

const PHASES = [
  { pct:0.00, label:'Départ',          comment:'Les partants s\'élancent des starting-gates !' },
  { pct:0.22, label:'1er virage',      comment:'Premier virage — le peloton se resserre, Premier Galop en embuscade.' },
  { pct:0.45, label:'Ligne dos',       comment:'Ligne droite dos — Premier Galop remonte, bonne position !' },
  { pct:0.72, label:'Virage final',    comment:'Virage final ! Tout se joue maintenant, le peloton s\'élance !' },
  { pct:0.90, label:'Ligne d\'arrivée',comment:'⚡ Dernière ligne droite — Premier Galop donne tout !' },
];
let phaseIdx = 0;
let _lastComment = '';
let _liveRows = null;                                  // nœuds DOM du classement (réutilisés)

// Pari : câblable par le jeu (window.RACE_BET) ou via URL ?bet=10&odds=3.5&place=1
const BET = (() => {
  if (window.RACE_BET) return window.RACE_BET;
  const q = new URLSearchParams(location.search);
  if (!q.get('bet')) return null;
  // net = gain/perte net pré-calculé par le jeu (fait foi pour l'affichage) ; sinon déduit.
  return {
    amount: +q.get('bet') || 0, odds: +q.get('odds') || 1, place: +q.get('place') || 1,
    net: q.get('betnet') != null ? +q.get('betnet') : null,
  };
})();
// Photo-finish forcé pour démo/test (?photo=1) ; le jeu peut aussi viser window.RACE_PHOTO.
const PHOTO_FORCED = new URLSearchParams(location.search).get('photo') === '1';

// Commentaire dramatique du sprint final (gated : pas d'écriture DOM à chaque frame).
function maybeDramaComment() {
  if (progress <= 0.86 || progress >= 1) return;
  const stand = RUNNERS.map(r => ({ r, s: runnerS(r, progress) })).sort((a, b) => b.s - a.s);
  const lead = stand[0].r, second = stand[1].r;
  const gap = (stand[0].s - stand[1].s) / GAP_PER_POS;
  const me = RUNNERS.find(r => r.isPlayer);
  let txt;
  if (gap < 0.5)                                       txt = `📸 Photo-finish en vue ! ${lead.name} et ${second.name} au coude-à-coude !`;
  else if (lead.isPlayer)                              txt = `⚡ ${me.name} s'envole vers la victoire !`;
  else if (stand.slice(0, 3).some(e => e.r.isPlayer))  txt = `⚡ ${me.name} lutte pour le podium dans la dernière ligne !`;
  else                                                 txt = `${lead.name} file en tête, ${me.name} tente tout !`;
  if (txt !== _lastComment) { _lastComment = txt; document.getElementById('comment').textContent = txt; }
}

function setSpeed(s) {
  gameSpeed = s;
  const el = document.getElementById('hud-speed'); if (el) el.innerHTML = '»<small>×' + s + '</small>';
}
function cycleSpeed() { setSpeed(gameSpeed === 1 ? 2 : gameSpeed === 2 ? 4 : 1); }   // bouton rouge » (haut-gauche)
function stopRace() {                                                                 // bouton power (haut-droite)
  if (raceRunning && !raceEnded) { progress = 1; raceEnded = true; raceRunning = false; endRace(); }
}

function gameLoop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  if (_boost > 0) _boost = Math.max(0, _boost - dt * 1.6);   // boost joueur (décroît)

  if (raceRunning && !raceEnded) {
    // Vitesse de course variable : burst de départ, sprint final.
    const phaseMul = (progress < 0.05) ? (0.2 + progress / 0.05 * 0.8)
                   : (progress > 0.86) ? 1.30 : 1.0;
    const dp = dt * 0.013 * gameSpeed * phaseMul;
    progress = Math.min(1, progress + dp);
    frameCount += dt * 14 * gameSpeed;                 // cadence galop inchangée
    scrollX  += dt * BASE_SCROLL * gameSpeed * phaseMul;  // décor défile droite → gauche
    if (progress > 0.85 && _standAnchor === null) _standAnchor = scrollX;  // tribune entre par la droite

    // Cadence galop sprite : 1 frame toutes les 1000/fps ms (dt en s → ×1000), × vitesse.
    if (typeof HORSE_META !== 'undefined') {
      const fstep = 1000 / HORSE_META.fps, fdt = dt * 1000 * gameSpeed;
      for (const r of RUNNERS) {
        r.frameTimer += fdt;
        while (r.frameTimer >= fstep) { r.frame = (r.frame + 1) % HORSE_META.nframes; r.frameTimer -= fstep; }
      }
    }

    document.getElementById('prog-fill').style.width = (progress * 100).toFixed(1) + '%';
    maybeDramaComment();

    // Phase
    let newPhase = phaseIdx;
    for (let i = PHASES.length - 1; i >= 0; i--) {
      if (progress >= PHASES[i].pct) { newPhase = i; break; }
    }
    if (newPhase !== phaseIdx) {
      phaseIdx = newPhase;
      setPhaseUI(phaseIdx);
    }

    if (progress >= 1) { raceEnded = true; endRace(); }
  }

  renderFrame();
  requestAnimationFrame(gameLoop);
}

// ── HUD IN-SCÈNE (réf. SO-Touch) ─────────────────────────────────────────────
function _panel(x, y, w, h) {                      // panneau semi-transparent arrondi
  ctx.fillStyle = 'rgba(0,0,0,0.42)';
  ctx.beginPath(); ctx.roundRect(x, y, w, h, 7); ctx.fill();
}
// Classement en bas à gauche — fond crème #FFFFE3, bordure noire (réf. SO-Touch) :
// carré casaque + nom [numéro] + cote. Mise à jour temps réel selon les positions.
function drawHudRanking() {
  const stand = RUNNERS.map(r => ({ r, s: runnerS(r, progress) })).sort((a, b) => b.s - a.s);
  const n = Math.min(6, stand.length), rowH = 15, w = 170, x0 = 8, h = n * rowH + 8, y0 = H - 8 - h;
  ctx.save();
  ctx.fillStyle = '#FFFFE3';
  ctx.beginPath(); ctx.roundRect(x0, y0, w, h, 4); ctx.fill();
  ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.stroke();
  ctx.textBaseline = 'middle';
  for (let i = 0; i < n; i++) {
    const e = stand[i], ry = y0 + 4 + i * rowH + rowH / 2;
    if (e.r.isPlayer) { ctx.fillStyle = 'rgba(201,168,76,0.32)'; ctx.fillRect(x0 + 1, ry - rowH / 2, w - 2, rowH); }
    ctx.textAlign = 'left'; ctx.font = 'bold 10px Arial'; ctx.fillStyle = '#222';
    ctx.fillText(i + 1, x0 + 7, ry);
    ctx.fillStyle = e.r.silk; ctx.fillRect(x0 + 18, ry - 5, 10, 10);
    ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = 0.5; ctx.strokeRect(x0 + 18, ry - 5, 10, 10);
    ctx.fillStyle = '#1A1A1A'; ctx.font = (e.r.isPlayer ? 'bold ' : '') + '10px Arial';
    const nm = (e.r.name.length > 12 ? e.r.name.slice(0, 11) + '…' : e.r.name) + ' [' + e.r.id + ']';
    ctx.fillText(nm, x0 + 33, ry);
    ctx.textAlign = 'right'; ctx.fillStyle = '#7A1010'; ctx.font = 'bold 9px Arial';
    ctx.fillText(e.r.odds.toFixed(1), x0 + w - 7, ry);
  }
  ctx.restore();
}
// Mini-map en bas à droite : ovale vert foncé, point rouge FIXE = ligne d'arrivée,
// points colorés mobiles = position de chaque cheval (par sa progression réelle).
function drawHudMinimap() {
  const cx = W - 64, cy = H - 34, rx = 48, ry = 22;
  ctx.save();
  _panel(cx - rx - 10, cy - ry - 10, (rx + 10) * 2, (ry + 10) * 2);
  ctx.strokeStyle = '#16401E'; ctx.lineWidth = 9;
  ctx.beginPath(); ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2); ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,0.85)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2); ctx.stroke();
  // point rouge FIXE = ligne d'arrivée (haut de l'ovale)
  const fa = -Math.PI / 2;
  ctx.fillStyle = '#E83A2A';
  ctx.beginPath(); ctx.arc(cx + Math.cos(fa) * rx, cy + Math.sin(fa) * ry, 3.6, 0, Math.PI * 2); ctx.fill();
  // points mobiles = chaque cheval
  for (const r of RUNNERS) {
    const a = -Math.PI / 2 + runnerS(r, progress) * Math.PI * 2;
    const px = cx + Math.cos(a) * rx, py = cy + Math.sin(a) * ry;
    ctx.fillStyle = r.silk;
    ctx.beginPath(); ctx.arc(px, py, r.isPlayer ? 3.4 : 2.4, 0, Math.PI * 2); ctx.fill();
    if (r.isPlayer) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.stroke(); }
  }
  ctx.restore();
}
// Distance restante : texte jaune sur fond noir, AU-DESSUS de la mini-map. → 0 m.
function drawHudDistance() {
  const remain = Math.max(0, Math.round(RACE_DIST * (1 - progress) / 25) * 25);
  const cx = W - 64, boxW = 80, boxH = 22, x = cx - boxW / 2, y = H - 34 - 22 - 10 - boxH;
  ctx.save();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.roundRect(x, y, boxW, boxH, 4); ctx.fill();
  ctx.fillStyle = '#F5D21E'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.font = 'bold 16px Arial';
  ctx.fillText(remain + ' m', cx, y + boxH / 2 + 1);
  ctx.restore();
}

// Dessine UNE frame (fond + chevaux + effets) sans modifier l'état ni relancer
// la boucle. Réutilisable pour un rendu figé (?frame=) ou un poster de course.
function renderFrame() {
  ctx.clearRect(0, 0, W, H);             // clear (drawBg ne couvre pas tout si image pas prête)
  _leaderS = leaderS(progress);          // cache leader 1×/frame (X + classement)
  drawBg();                              // fond WebP (parallaxe) + piste procédurale
  drawStartGates(progress);              // stalles (reculent avec le décor)
  // ligne d'arrivée : défile depuis la droite dans les derniers mètres, passe au poteau à p≈1
  if (progress > 0.86) { const fx = X_LEADER * W + (1 - progress) * 5 * W; if (fx < W + 40) drawFinishLine(fx); }
  updateDust();

  // CHANTIER 2 — mouvement vertical : chaque cheval lerp (0.02) vers sa lane cible.
  // CHANTIER 3 — z-order DYNAMIQUE : tri par Y RÉEL (`r._y`) recalculé chaque frame.
  const order = [...RUNNERS].sort((a, b) => runnerS(b, progress) - runnerS(a, progress));
  const rankOf = new Map(); order.forEach((rr, k) => rankOf.set(rr, k));
  RUNNERS.forEach((r, i) => {
    const tgt = targetLaneY(r, i, progress, rankOf.get(r));
    if (STATIC_FRAME) r._y = tgt; else r._y += (tgt - r._y) * 0.02;
  });
  const sorted = RUNNERS.map((r, i) => ({ r, i })).sort((a, b) => a.r._y - b.r._y);

  sorted.forEach(({r,i}) => {
    const xPct = runnerXPct(r, progress);
    const yPct = r._y;                       // Y animé (CHANTIER 2)

    const px = xPct * W;
    const py = yPct * H;

    // Perspective 2.5D : depth → scale + voile de profondeur (fog), cohérent z-order.
    const depth = laneDepth(yPct);
    const fog = (1 - depth) * 0.32;

    if (typeof drawHorseSprite === 'function') {
      // ── SPRITE VECTORIEL (horse_vector_assets.js) : ancre = sabots à py (= r._y) ──
      const sS = (0.42 + depth * 0.20) * (r.isPlayer ? 1.06 : 1.0);   // scale 2.5D (fond→avant)
      const topY = py - HORSE_META.frameH * sS;                       // haut du sprite

      ctx.save();                                                     // ombre sous les sabots
      ctx.globalAlpha = 0.18 + depth * 0.12; ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.ellipse(px, py - 2*sS, 58*sS, 8*sS, 0, 0, Math.PI*2); ctx.fill();
      ctx.restore();

      if (raceRunning && depth > 0.45 && Math.random() < 0.15 * gameSpeed * (progress < 0.04 ? 4 : 1)) {
        spawnDust(px - 8*sS, py - 3*sS, r.body);                      // poussière sous les sabots
      }

      drawHorseFogged(px, py, sS, r.frame, r.body, r.silk, fog);      // cheval + fog source-atop APRÈS

      if (depth > 0.4) {                                              // numéro dossard (au-dessus du dos)
        const by = topY + 6;
        ctx.save();
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.beginPath(); ctx.roundRect(px - 9, by - 6, 18, 13, 3); ctx.fill();
        ctx.fillStyle = 'white'; ctx.font = 'bold 10px Arial';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(r.id, px, by + 1);
        ctx.restore();
      }

      if (r.isPlayer && raceRunning) {                               // halo joueur
        ctx.save();
        ctx.globalAlpha = 0.25 + Math.sin(Date.now() * 0.004) * 0.1;
        ctx.strokeStyle = '#C9A84C'; ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(px, py - HORSE_META.frameH * sS * 0.45, HORSE_META.frameW * sS * 0.5, HORSE_META.frameH * sS * 0.5, 0, 0, Math.PI*2);
        ctx.stroke();
        ctx.restore();
      }
    } else {
      // ── FALLBACK : SpriteManager PNG (dormant) sinon rendu VECTORIEL drawHorse ──
      const sc = (0.70 + depth * 0.30) * (r.isPlayer ? 1.06 : 1.0);

      ctx.save();
      ctx.globalAlpha = 0.18 + depth * 0.12; ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.ellipse(px - 3*sc, py + 4*sc, 22*sc, 5*sc, 0, 0, Math.PI*2); ctx.fill();
      ctx.restore();

      if (raceRunning && depth > 0.45 && Math.random() < 0.15 * gameSpeed * (progress < 0.04 ? 4 : 1)) {
        spawnDust(px - 10*sc, py + 14*sc, r.body);
      }

      if (spriteManager.isLoaded) {
        spriteManager.renderSprite(ctx, r.id, Math.floor(frameCount + i * 1.7) % 8, px, py, sc, fog);
      } else {
        drawHorse(px, py, sc, Math.floor(frameCount + i * 1.7), r.body, r.silk, r.cap, r.trim, r.isPlayer, 0, fog, 0);
      }

      if (depth > 0.4) {
        ctx.save();
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.beginPath(); ctx.roundRect(px - 8*sc, py - 28*sc, 16*sc, 12*sc, 3*sc); ctx.fill();
        ctx.fillStyle = 'white'; ctx.font = `bold ${9*sc}px Arial`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(r.id, px, py - 22*sc);
        ctx.restore();
      }

      if (r.isPlayer && raceRunning) {
        ctx.save();
        ctx.globalAlpha = 0.25 + Math.sin(Date.now() * 0.004) * 0.1;
        ctx.strokeStyle = '#C9A84C'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.ellipse(px, py, 30*sc, 16*sc, 0, 0, Math.PI*2); ctx.stroke();
        ctx.restore();
      }
    }
  });

  // HUD in-scène (SO-Touch) : classement, mini-map, distance restante
  drawHudRanking();
  drawHudMinimap();
  drawHudDistance();
}

function setPhaseUI(idx) {
  for (let i = 0; i < 5; i++) {
    document.getElementById('ph'+i).className =
      'phase-dot' + (i < idx ? ' done' : i===idx ? ' active' : '');
  }
  document.getElementById('phase-label').textContent = PHASES[idx].label;
  // Le dernier segment laisse la main au commentaire dramatique (maybeDramaComment).
  if (idx < PHASES.length - 1) {
    _lastComment = PHASES[idx].comment;
    document.getElementById('comment').textContent = _lastComment;
  }
}

// Construit les 10 lignes du classement UNE fois ; on les réutilise ensuite.
function buildLiveRows() {
  const list = document.getElementById('live-list');
  list.innerHTML = '';
  _liveRows = {};
  RUNNERS.forEach(r => {
    const row = document.createElement('div');
    row.className = 'live-runner';
    row.innerHTML =
      `<div class="live-num" style="background:${r.silk};color:white">${r.id}</div>` +
      `<div class="live-name">${r.name}${r.isPlayer ? ' ★' : ''}</div>` +
      `<div class="live-pos"></div>` +
      `<div class="live-bar-bg"><div class="live-bar-fill" style="background:${r.silk}"></div></div>`;
    row._pos = row.querySelector('.live-pos');
    row._bar = row.querySelector('.live-bar-fill');
    _liveRows[r.id] = row;
    list.appendChild(row);
  });
}

// Met à jour le top 6 SANS réécrire l'innerHTML : on mute les nœuds existants et on
// les réordonne par appendChild (déplace le nœud → la transition CSS de barre survit).
function updateLive() {
  if (!_liveRows) buildLiveRows();
  const list = document.getElementById('live-list');
  const stand = RUNNERS.map(r => ({ r, s: runnerS(r, progress) })).sort((a, b) => b.s - a.s);
  const lead = _leaderS || (stand[0] && stand[0].s) || 1;
  stand.forEach((e, rank) => {
    const row = _liveRows[e.r.id];
    if (rank < 6) {
      row.style.display = '';
      row._pos.textContent = (rank + 1) + 'e';
      row._bar.style.width = Math.round(Math.max(0.05, Math.min(1, e.s / lead)) * 100) + '%';
      list.appendChild(row);               // réordonne sans recréer le nœud
    } else {
      row.style.display = 'none';
    }
  });
}

function endRace() {
  raceRunning = false;
  const photo = isPhotoFinish();
  const show = () => renderResult(photo);
  if (photo) runPhotoFinishFlash(show); else show();
}

// Photo-finish : écart gagnant < 0.5 longueur au poteau (p=1, shuffle=0).
// Photo-finish : forcé par le jeu (window.RACE_PHOTO / ?photo=1) ou écart gagnant réel
// < 0.5 longueur. Le champ standalone par défaut (rangs entiers, écart = 1 longueur)
// n'en déclenche pas seul — c'est le jeu parent (marges serrées) ou l'override qui l'arme.
function isPhotoFinish() {
  if (PHOTO_FORCED || window.RACE_PHOTO) return true;
  const s = RUNNERS.map(r => runnerS(r, 1)).sort((a, b) => b - a);
  return (s[0] - s[1]) < GAP_PER_POS * 0.5;
}

// Flash blanc + libellé « PHOTO FINISH » (one-shot). Filet de sécurité setTimeout :
// le résultat s'affiche même si requestAnimationFrame est throttlé (onglet caché).
function runPhotoFinishFlash(done) {
  const t0 = performance.now();
  let finished = false;
  const finish = () => { if (!finished) { finished = true; done(); } };
  (function flash(now) {
    const k = (now - t0) / 800;
    renderFrame();
    ctx.fillStyle = `rgba(255,255,255,${Math.max(0, 0.55 * (1 - k))})`;
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 26px Arial'; ctx.textAlign = 'center';
    ctx.fillText('PHOTO FINISH', W / 2, H * 0.26);
    if (k < 1) requestAnimationFrame(flash); else finish();
  })(t0);
  setTimeout(finish, 1200);
}

function renderResult(photo) {
  const order  = [...RUNNERS].sort((a, b) => runnerS(b, 1) - runnerS(a, 1));  // = ordre .pos final
  const me     = RUNNERS.find(r => r.isPlayer);
  const myRank = order.findIndex(r => r.isPlayer) + 1;
  const podCell = r => `<span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:${r.silk};margin-bottom:3px;"></span><br>${r.name}${r.isPlayer ? ' ★' : ''}`;

  document.getElementById('res-title').innerHTML =
    (photo ? '<span class="photo-badge">PHOTO FINISH</span><br>' : '') +
    (myRank === 1 ? '🏆 VICTOIRE !' : 'Arrivée');
  document.getElementById('pod1').innerHTML = '🥇<br>' + podCell(order[0]);
  document.getElementById('pod2').innerHTML = '🥈<br>' + podCell(order[1]);
  document.getElementById('pod3').innerHTML = '🥉<br>' + podCell(order[2]);
  document.getElementById('res-player').textContent = `${me.name} : ${myRank}ᵉ / ${RUNNERS.length}`;

  const money = document.getElementById('res-money');
  if (BET && BET.amount > 0) {
    // net pré-calculé par le jeu si fourni, sinon déduit (mode standalone).
    const net = (BET.net != null) ? BET.net
              : (myRank <= (BET.place || 1) ? Math.round(BET.amount * BET.odds - BET.amount) : -BET.amount);
    const won = net > 0;
    money.textContent = won ? `🎰 Pari gagné : +${net} €` : `🎰 Pari perdu : ${net} €`;
    money.style.color = won ? '#4CD08A' : '#E06A6A';
  } else { money.textContent = ''; }

  document.getElementById('result').classList.add('show');
  document.getElementById('res-continue').onclick = continueRace;
}

// Continuer : câblable par le jeu parent (postMessage / window.onRaceContinue), sinon reset.
function continueRace() {
  const order = [...RUNNERS].sort((a, b) => runnerS(b, 1) - runnerS(a, 1));
  const payload = { playerRank: order.findIndex(r => r.isPlayer) + 1, order: order.map(r => ({ id: r.id, name: r.name })) };
  if (window.parent !== window) window.parent.postMessage({ type: 'race-done', ...payload }, '*');
  if (typeof window.onRaceContinue === 'function') { window.onRaceContinue(payload); return; }
  location.reload();
}

function startRace() {
  raceRunning = true;
  document.getElementById('btn-start').style.display = 'none';
  setPhaseUI(0);
  requestAnimationFrame(ts => { lastTime = ts; gameLoop(ts); });
}

// Init statique
drawBg();
updateLive();
__afterBg = drawBg;                     // redessine le fond WebP dès qu'il est chargé

// ── MODES PREVIEW / CÂBLAGE (lus dans l'URL) ──────────────────────────────────
const _params = new URLSearchParams(location.search);

// En-tête de course alimenté par le jeu (?racename, ?track, ?distance, ?grade)
// — remplace le « Prix des Poulinieres / Chantilly » codé en dur.
(function () {
  const name = _params.get('racename'), track = _params.get('track'),
        dist = _params.get('distance'), grade = _params.get('grade');
  if (name) document.querySelector('.race-name').textContent = name;
  if (track || dist) {
    const bits = [];
    if (track) bits.push('📍 ' + track);
    if (dist) bits.push(dist);
    bits.push(RUNNERS.length + ' partants');
    document.querySelector('.race-meta').textContent = bits.join(' • ');
  }
  if (grade) document.querySelector('.race-grade').textContent = grade;
})();

// Rendu d'une frame figée, sans boucle :  race_v3.html?frame=0.5
const _frame = _params.get('frame');
if (_frame !== null) {
  const renderStaticFrame = () => {
    progress   = Math.max(0, Math.min(1, parseFloat(_frame) || 0));
    frameCount = progress * 200;        // pose de galop cohérente
    scrollX    = progress * 6000;       // décor défilant cohérent
    _standAnchor = 0.85 * 6000;         // tribune ancrée à p=0.85 (cohérent avec scrollX figé)
    if (typeof HORSE_META !== 'undefined') {   // frames déterministes (capture reproductible)
      const fb = Math.floor(progress * 60);
      RUNNERS.forEach((r, i) => { r.frame = (fb + i * 3) % HORSE_META.nframes; });
    }
    let pidx = 0;
    for (let i = PHASES.length - 1; i >= 0; i--) { if (progress >= PHASES[i].pct) { pidx = i; break; } }
    setPhaseUI(pidx);
    STATIC_FRAME = true;                 // Y figé sur la cible (pas de lerp temporel)
    raceRunning = true;                 // halo joueur visible
    renderFrame();
    raceRunning = false;
    STATIC_FRAME = false;
  };
  __afterBg = renderStaticFrame;        // re-render figé quand le WebP est prêt
  renderStaticFrame();
}

// Vitesse initiale (le jeu passe ?speed=4 pour une course brève ~20s).
const _spd = parseFloat(_params.get('speed'));
if (_spd && [1, 2, 4].indexOf(_spd) >= 0) setSpeed(_spd);
else if (_spd) setSpeed(Math.max(1, Math.min(4, _spd)));   // passe par setSpeed → label HUD synchronisé

// Démarrage auto optionnel (preview / câblage iframe) :  race_v3.html?autostart=1
if (_params.get('autostart')) startRace();
</script>
</body>
</html>
