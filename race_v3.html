<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Course — Turf Manager France</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0D2B1A;
  display:flex; flex-direction:column; align-items:center;
  min-height:100vh; padding:12px;
  max-width:430px; margin:0 auto;
  font-family:'Georgia',serif; color:white;
}
.race-header {
  width:100%; display:flex; justify-content:space-between; align-items:center;
  background:rgba(0,0,0,0.5); border:1px solid rgba(201,168,76,0.3);
  border-radius:12px; padding:10px 14px; margin-bottom:10px;
}
.race-name { font-size:15px; font-weight:700; color:#E8C96A; }
.race-meta { font-size:11px; color:rgba(255,255,255,0.5); margin-top:2px; }
.race-grade { background:#C9A84C; color:#0D2B1A; font-size:10px; font-weight:800; padding:3px 8px; border-radius:4px; }
.phase-row { width:100%; display:flex; gap:4px; margin-bottom:8px; align-items:center; }
.phase-dot { flex:1; height:3px; border-radius:2px; background:rgba(255,255,255,0.12); transition:all 0.4s; }
.phase-dot.done { background:rgba(201,168,76,0.4); }
.phase-dot.active { background:#C9A84C; box-shadow:0 0 8px #C9A84C; }
.phase-label { font-size:10px; color:rgba(255,255,255,0.5); white-space:nowrap; margin-left:6px; min-width:90px; text-align:right; }
.canvas-wrap { width:100%; border-radius:14px; overflow:hidden; border:1px solid rgba(201,168,76,0.25); position:relative; margin-bottom:10px; box-shadow:0 8px 32px rgba(0,0,0,0.5); }
canvas { display:block; width:100%; }
.comment-box { width:100%; background:rgba(0,0,0,0.45); border-left:3px solid #C9A84C; border-radius:0 8px 8px 0; padding:10px 14px; margin-bottom:10px; min-height:44px; display:flex; align-items:center; }
.comment-text { font-size:13px; color:#E8C96A; font-style:italic; line-height:1.5; }
.live-box { width:100%; background:rgba(0,0,0,0.3); border-radius:10px; padding:10px 12px; border:1px solid rgba(255,255,255,0.07); margin-bottom:10px; }
.live-title { font-size:9px; color:rgba(255,255,255,0.35); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:7px; }
.live-runner { display:flex; align-items:center; gap:7px; padding:3px 0; }
.live-num { width:18px; height:18px; border-radius:3px; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:800; flex-shrink:0; }
.live-name { flex:1; font-size:11px; color:rgba(255,255,255,0.75); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.live-pos { font-size:10px; font-weight:700; color:#C9A84C; width:20px; text-align:right; flex-shrink:0; }
.live-bar-bg { width:60px; height:3px; background:rgba(255,255,255,0.08); border-radius:2px; flex-shrink:0; }
.live-bar-fill { height:100%; border-radius:2px; transition:width 0.5s ease; }
.controls { position:absolute; right:8px; bottom:8px; display:flex; gap:6px; z-index:5; }
.btn-speed { background:rgba(0,0,0,0.55); border:1px solid rgba(255,255,255,0.2); border-radius:8px; padding:6px 10px; color:rgba(255,255,255,0.75); font-size:11px; font-weight:700; cursor:pointer; transition:all 0.2s; }
.btn-speed.active { background:rgba(201,168,76,0.85); border-color:#C9A84C; color:#0D2B1A; }
.btn-primary { width:100%; background:linear-gradient(135deg,#C9A84C,#A8882A); color:#0D2B1A; border:none; border-radius:10px; padding:14px; font-size:15px; font-weight:800; cursor:pointer; margin-bottom:8px; }
.btn-secondary { width:100%; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.15); color:rgba(255,255,255,0.7); border-radius:10px; padding:12px; font-size:13px; cursor:pointer; }
/* ── HUD : barre de progression de course ──────────────────────────────────── */
.progress-wrap { width:100%; height:5px; background:rgba(255,255,255,0.1); border-radius:3px; margin-bottom:8px; overflow:hidden; }
.progress-fill { height:100%; width:0; background:linear-gradient(90deg,#C9A84C,#E8C96A); transition:width .15s linear; }
/* ── Écran de résultat (overlay sur le canvas) ─────────────────────────────── */
.result { position:absolute; inset:0; background:rgba(8,20,12,0.94); display:none; flex-direction:column; align-items:center; justify-content:center; gap:9px; padding:16px; z-index:10; text-align:center; }
.result.show { display:flex; }
.result-title { font-size:18px; font-weight:800; color:#E8C96A; line-height:1.35; }
.podium { display:flex; align-items:flex-end; gap:10px; margin:4px 0; }
.pod { background:rgba(255,255,255,0.07); border-radius:8px; padding:8px 10px; font-size:11px; min-width:80px; color:#fff; line-height:1.5; }
.pod1 { padding-bottom:24px; border:1px solid #C9A84C; }
.pod2 { padding-bottom:14px; }
.result-player { font-size:13px; color:rgba(255,255,255,0.85); }
.result-money { font-size:15px; font-weight:800; min-height:18px; }
.photo-badge { font-size:11px; letter-spacing:2px; color:#fff; background:#B71C1C; padding:2px 8px; border-radius:4px; }
.btn-continue { background:linear-gradient(135deg,#C9A84C,#A8882A); color:#0D2B1A; border:none; border-radius:10px; padding:11px 26px; font-size:14px; font-weight:800; cursor:pointer; margin-top:4px; }
</style>
</head>
<body>

<div class="race-header">
  <div>
    <div class="race-name">Prix des Poulinieres</div>
    <div class="race-meta">📍 Chantilly • Herbe • 1600m • 10 partants</div>
  </div>
  <div class="race-grade">MAIDEN</div>
</div>

<div class="phase-row">
  <div class="phase-dot" id="ph0"></div>
  <div class="phase-dot" id="ph1"></div>
  <div class="phase-dot" id="ph2"></div>
  <div class="phase-dot" id="ph3"></div>
  <div class="phase-dot" id="ph4"></div>
  <div class="phase-label" id="phase-label">Prêt</div>
</div>

<div class="progress-wrap"><div class="progress-fill" id="prog-fill"></div></div>

<div class="canvas-wrap">
  <canvas id="raceCanvas" width="800" height="380"></canvas>
  <div class="controls">
    <button class="btn-speed active" id="spd1" onclick="setSpeed(1)">×1</button>
    <button class="btn-speed" id="spd2" onclick="setSpeed(2)">×2</button>
    <button class="btn-speed" id="spd4" onclick="setSpeed(4)">×4</button>
  </div>
  <div class="result" id="result">
    <div class="result-title" id="res-title"></div>
    <div class="podium">
      <div class="pod pod2" id="pod2"></div>
      <div class="pod pod1" id="pod1"></div>
      <div class="pod pod3" id="pod3"></div>
    </div>
    <div class="result-player" id="res-player"></div>
    <div class="result-money" id="res-money"></div>
    <button class="btn-continue" id="res-continue">Continuer →</button>
  </div>
</div>

<div class="comment-box">
  <div class="comment-text" id="comment">Appuie sur Lancer pour débuter la course...</div>
</div>

<div class="live-box">
  <div class="live-title">Classement en direct</div>
  <div id="live-list"></div>
</div>

<button class="btn-primary" id="btn-start" onclick="startRace()">🏁 Lancer la course</button>
<button class="btn-secondary" onclick="location.reload()">↺ Rejouer</button>

<script>
const C = document.getElementById('raceCanvas');
const ctx = C.getContext('2d');
const W = C.width, H = C.height;

// ── CONSTANTES ────────────────────────────────────────────────────────────────
// ── BANDES VERTICALES (SO-Touch) : haut 55% décor, ~10% sol, bas 35% piste ───
const SKY_FRAC  = 0.55;                 // bas du décor / ligne d'horizon
const HORIZON   = H * SKY_FRAC;         // 0.55H (était 0.36H)
const TRACK_TOP = 0.62;                 // lane la plus LOINTAINE (petite, sombre, haute)
const TRACK_BOT = 0.94;                 // lane la plus PROCHE (grande, claire, basse)

// ── CAMÉRA : chevaux centrés à l'écran, c'est le fond qui défile ─────────────
const CAM_XMIN = 0.15, CAM_XMAX = 0.85; // bande X à l'écran
const CAM_LEAD = 0.66;                   // X du leader (droite-centre)
const CAM_SPAN = 0.10;                   // écart-standing qui remplit la bande
const GAP_PER_POS = 0.011;               // 1 « longueur » de standing

// ── 8 FRAMES GALOP (angles membres en degrés, basé Muybridge) ─────────────────
const FRAMES = [
  { fl:-35, fr: 15, rl: 25, rr:-25, spine: 3, neck:18 },
  { fl: -5, fr: 45, rl: 55, rr:  5, spine: 6, neck:22 },
  { fl: 25, fr: 65, rl: 28, rr: 45, spine: 8, neck:26 },
  { fl: 55, fr: 35, rl:  5, rr: 62, spine: 5, neck:20 },
  { fl: 42, fr:-12, rl:-22, rr: 32, spine: 2, neck:15 },
  { fl: 12, fr:-28, rl:-38, rr: 12, spine:-2, neck:10 },
  { fl:-18, fr: -8, rl:-18, rr:-28, spine:-5, neck: 6 },
  { fl:-38, fr:  8, rl:  8, rr:-38, spine:-2, neck:12 },
];

// ── PARTANTS ──────────────────────────────────────────────────────────────────
// Champ par défaut (mode standalone). Le jeu peut le remplacer via ?runners=JSON
// (noms + couleurs + positions finales) et ?pos= (rang final du joueur).
const DEFAULT_RUNNERS = [
  { id:1,  name:'Premier Galop', isPlayer:true,  body:'#1A1A1A', silk:'#E8651A', cap:'#0A0A0A', trim:'#FFFFFF', pos:3  },
  { id:2,  name:'Comete Levant', isPlayer:false, body:'#7B3F00', silk:'#1565C0', cap:'#FFFFFF', trim:'#F9A825', pos:1  },
  { id:3,  name:'Star Royal',    isPlayer:false, body:'#C8A060', silk:'#B71C1C', cap:'#F5F5F5', trim:'#1565C0', pos:5  },
  { id:4,  name:'Eclat Dore',    isPlayer:false, body:'#3E2723', silk:'#6A1B9A', cap:'#F9A825', trim:'#FFFFFF', pos:2  },
  { id:5,  name:'Tonnerre',      isPlayer:false, body:'#8D5524', silk:'#1B5E20', cap:'#FFFFFF', trim:'#F9A825', pos:4  },
  { id:6,  name:'Vaillant',      isPlayer:false, body:'#212121', silk:'#E65100', cap:'#212121', trim:'#FFECB3', pos:6  },
  { id:7,  name:'Diamant Noir',  isPlayer:false, body:'#D7B899', silk:'#00695C', cap:'#212121', trim:'#80CBC4', pos:7  },
  { id:8,  name:'Rafale',        isPlayer:false, body:'#6D4C41', silk:'#C62828', cap:'#F5F5F5', trim:'#C62828', pos:8  },
  { id:9,  name:'Zenith',        isPlayer:false, body:'#37474F', silk:'#0277BD', cap:'#F57F17', trim:'#0277BD', pos:9  },
  { id:10, name:'Mistral',       isPlayer:false, body:'#C4A882', silk:'#AD1457', cap:'#FFFFFF', trim:'#F8BBD9', pos:10 },
];

const RUNNERS = (function () {
  try {
    const raw = new URLSearchParams(location.search).get('runners');
    if (raw) {
      const arr = JSON.parse(raw);
      if (Array.isArray(arr) && arr.length >= 2) {
        const built = arr.map((r, i) => ({
          id:       r.id != null ? r.id : i + 1,
          name:     r.name || ('Cheval ' + (i + 1)),
          isPlayer: !!r.isPlayer,
          body:     r.body || '#6D4C41',
          silk:     r.silk || '#1565C0',
          cap:      r.cap  || '#FFFFFF',
          trim:     r.trim || '#F9A825',
          pos:      r.pos  != null ? r.pos : i + 1,
        }));
        if (!built.some(r => r.isPlayer)) built[0].isPlayer = true;   // garantit un joueur
        const posParam = parseInt(new URLSearchParams(location.search).get('pos'), 10);
        if (posParam) { const pl = built.find(r => r.isPlayer); if (pl) pl.pos = posParam; }
        return built;
      }
    }
  } catch (e) { /* JSON invalide → champ par défaut */ }
  return DEFAULT_RUNNERS;
})();

// Lanes de profondeur dans la zone basse. i=0 → fond (loin), dernier → proche.
// Déterministe (pas de Math.random) → ?frame reproductible.
const LANES = RUNNERS.map((r, i) => {
  const t = i / (RUNNERS.length - 1);             // 0=loin .. 1=proche
  const eased = Math.pow(t, 1.2);                 // lanes proches plus écartées (perspective)
  const jitter = (((i * 67) % 13) - 6) * 0.0010;  // ±~0.006, déterministe
  return TRACK_TOP + (TRACK_BOT - TRACK_TOP) * eased + jitter;
});

// Ordre de dessin par profondeur — constant (LANES ne change pas) → précalculé 1×.
const DRAW_ORDER = RUNNERS.map((r, i) => ({ r, i })).sort((a, b) => LANES[a.i] - LANES[b.i]);

// ── STANDINGS & CAMÉRA (side-scroller SO-Touch) ──────────────────────────────
// Caméra fixe : les chevaux restent dans une bande centrée, c'est le fond qui
// défile (bgOff). La position EN COURSE est un scalaire pur et déterministe
// dérivé de .pos → ?frame reproductible et .pos reste le résultat.
// shuffle : brassage doux début/milieu qui s'annule vers p=0.85 (ordre final=.pos).
function runnerS(r, p) {
  const lag     = (r.pos - 1) * GAP_PER_POS;          // espacement par rang
  const open    = Math.min(1, p * 3);                 // groupés au départ puis s'écartent
  const settle  = Math.max(0, 1 - p / 0.85);          // 1 au départ → 0 à p=0.85
  const shuffle = Math.sin(p * 6.0 + r.id * 1.7) * 0.5 * GAP_PER_POS * settle;
  return Math.max(0, p - lag * open + shuffle);
}

let _leaderS = 0;                                     // cache : recalculé 1×/frame
function leaderS(p) {
  let m = 0;
  for (const r of RUNNERS) { const v = runnerS(r, p); if (v > m) m = v; }
  return m;
}

// standing → X écran dans la bande [CAM_XMIN..CAM_XMAX] ; le leader est fixé à
// CAM_LEAD. Compresseur doux : un leader échappé ne pousse pas le peloton hors champ.
function runnerXPct(r, p) {
  const ls   = (p === progress) ? _leaderS : leaderS(p);
  const g    = (ls - runnerS(r, p)) / GAP_PER_POS;            // écart en longueurs, ≥0
  const span = CAM_SPAN / GAP_PER_POS;                        // longueurs qui remplissent la bande
  const back = (g / span) * (CAM_LEAD - CAM_XMIN) / (1 + g * 0.045);
  return Math.max(CAM_XMIN - 0.05, Math.min(CAM_XMAX, CAM_LEAD - back));
}

// Effet virage : intensité 0..1
function cornerAmt(p) {
  function bell(c, w) { return Math.exp(-Math.pow((p - c) / w, 2)); }
  return bell(0.22, 0.09) * 0.9 + bell(0.72, 0.09) * 0.9;
}

// depth 0 = loin (haut, petit, sombre) .. 1 = proche (bas, grand, clair)
function laneDepth(yPct) {
  return (yPct - TRACK_TOP) / (TRACK_BOT - TRACK_TOP);
}

// ── DESSIN CHEVAL ─────────────────────────────────────────────────────────────
function shade(hex, d) {
  let n = parseInt(hex.replace('#',''), 16);
  let r = Math.max(0,Math.min(255,(n>>16)+d));
  let g = Math.max(0,Math.min(255,((n>>8)&255)+d));
  let b = Math.max(0,Math.min(255,(n&255)+d));
  return '#'+((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');
}

// Mélange linéaire de deux couleurs hex (t=0 → a, t=1 → b). Pour le depth fog.
function mix(a, b, t) {
  const pa = parseInt(a.slice(1), 16), pb = parseInt(b.slice(1), 16);
  const ar = (pa>>16)&255, ag = (pa>>8)&255, ab = pa&255;
  const br = (pb>>16)&255, bg = (pb>>8)&255, bb = pb&255;
  const r = Math.round(ar + (br-ar)*t), g = Math.round(ag + (bg-ag)*t), bl = Math.round(ab + (bb-ab)*t);
  return '#'+(((r<<16)|(g<<8)|bl)>>>0).toString(16).padStart(6,'0');
}

function drawLeg(x, y, angle, len, col, w, s) {
  const a = angle * Math.PI / 180;
  const kx = x + Math.sin(a) * len * 0.5;
  const ky = y + Math.cos(a) * len * 0.5;
  // Cuisse
  ctx.strokeStyle = col;
  ctx.lineWidth = w * s;
  ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(kx, ky); ctx.stroke();
  // Canon (légèrement différent)
  const a2 = (angle + angle * 0.15) * Math.PI / 180;
  const ex = kx + Math.sin(a2) * len * 0.55;
  const ey = ky + Math.cos(a2) * len * 0.55;
  ctx.lineWidth = w * s * 0.75;
  ctx.beginPath(); ctx.moveTo(kx, ky); ctx.lineTo(ex, ey); ctx.stroke();
  // Sabot
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.ellipse(ex, ey, 2.8*s, 1.6*s, a2, 0, Math.PI*2);
  ctx.fill();
}

function drawHorse(cx, cy, s, fi, body, silk, cap, trim, isPlayer, motionBlur, fog, tilt) {
  const f = FRAMES[fi % 8];

  // Depth fog : les chevaux du fond virent vers le froid d'horizon (sans boîte,
  // sans toucher r.silk du HUD — on ne mélange que les copies locales).
  if (fog > 0.01) {
    body = mix(body, '#0A1622', fog);
    silk = mix(silk, '#0A1622', fog * 0.7);
    cap  = mix(cap,  '#0A1622', fog * 0.7);
    trim = mix(trim, '#0A1622', fog * 0.7);
  }

  ctx.save();
  ctx.translate(cx, cy);
  if (tilt) ctx.rotate(tilt);                  // inclinaison virage (pivot = centre cheval)

  // Motion blur horizontal (ghosts décalés vers l'arrière)
  if (motionBlur > 0) {
    for (let mb = 1; mb <= 3; mb++) {
      ctx.save();
      ctx.globalAlpha = 0.05 * (4 - mb);
      ctx.translate(-mb * motionBlur * s * 4, 0);
      _drawHorseBody(0, 0, s, f, body, silk, cap, trim, isPlayer);
      ctx.restore();
    }
  }

  ctx.globalAlpha = 1;
  _drawHorseBody(0, 0, s, f, body, silk, cap, trim, isPlayer);
  ctx.restore();
}

function _drawHorseBody(ox, oy, s, f, body, silk, cap, trim, isPlayer) {
  const legLen = 22 * s;
  const legW   = 2.8;
  const darkBody = shade(body, -35);
  const midBody  = shade(body, -18);

  // ── JAMBES ARRIÈRE (en dessous) ────────────────────────────────────────────
  drawLeg(ox + 6*s,  oy + 10*s, f.rl, legLen, darkBody, legW * 0.8, s);
  drawLeg(ox + 12*s, oy + 10*s, f.rr, legLen, midBody,  legW * 0.8, s);

  // ── CORPS ──────────────────────────────────────────────────────────────────
  ctx.save();
  ctx.translate(ox, oy);
  ctx.rotate(f.spine * Math.PI / 180);

  // Flanc principal
  const bodyGrad = ctx.createLinearGradient(-12*s, -14*s, -12*s, 14*s);
  bodyGrad.addColorStop(0,   shade(body, +30));
  bodyGrad.addColorStop(0.3, shade(body, +10));
  bodyGrad.addColorStop(0.7, body);
  bodyGrad.addColorStop(1,   shade(body, -40));
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.ellipse(-5*s, 2*s, 20*s, 10*s, -0.05, 0, Math.PI*2);
  ctx.fill();

  // Ventre
  ctx.fillStyle = shade(body, -25);
  ctx.beginPath();
  ctx.ellipse(-5*s, 9*s, 14*s, 5*s, 0, 0, Math.PI*2);
  ctx.fill();

  // Croupe (arrière plus bombé)
  ctx.fillStyle = shade(body, -10);
  ctx.beginPath();
  ctx.ellipse(8*s, 0*s, 12*s, 9*s, 0.15, 0, Math.PI*2);
  ctx.fill();

  // Épaule (avant)
  ctx.fillStyle = shade(body, +5);
  ctx.beginPath();
  ctx.ellipse(-17*s, 2*s, 9*s, 8*s, -0.1, 0, Math.PI*2);
  ctx.fill();

  // Queue
  ctx.strokeStyle = shade(body, -45);
  ctx.lineWidth = 5.5*s;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(15*s, -3*s);
  ctx.bezierCurveTo(24*s, -10*s, 28*s, 0*s, 26*s, 8*s);
  ctx.bezierCurveTo(24*s, 14*s, 20*s, 10*s, 16*s, 14*s);
  ctx.stroke();
  ctx.lineWidth = 2.5*s;
  ctx.beginPath();
  ctx.moveTo(14*s, -2*s);
  ctx.bezierCurveTo(22*s, -12*s, 30*s, -4*s, 28*s, 10*s);
  ctx.stroke();

  // ── COU ──────────────────────────────────────────────────────────────────
  const neckRad = f.neck * Math.PI / 180;
  ctx.save();
  ctx.translate(-18*s, -7*s);
  ctx.rotate(-neckRad * 0.7);

  // Cou (ellipse inclinée)
  const neckGrad = ctx.createLinearGradient(-5*s, -14*s, 4*s, 0);
  neckGrad.addColorStop(0, shade(body, +15));
  neckGrad.addColorStop(1, body);
  ctx.fillStyle = neckGrad;
  ctx.beginPath();
  ctx.ellipse(0, -9*s, 5.5*s, 11*s, 0, 0, Math.PI*2);
  ctx.fill();

  // Crinière (3 touffes)
  ctx.fillStyle = shade(body, -50);
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.ellipse(-3*s - i*1.5*s, (-17 + i*4)*s, 3.5*s, 2*s, -0.4 + i*0.1, 0, Math.PI*2);
    ctx.fill();
  }

  // ── TÊTE ─────────────────────────────────────────────────────────────────
  ctx.translate(0, -20*s);

  // Ganache/mâchoire
  ctx.fillStyle = shade(body, -20);
  ctx.beginPath();
  ctx.ellipse(-3*s, 2*s, 5*s, 3.5*s, 0.3, 0, Math.PI*2);
  ctx.fill();

  // Tête principale
  const headGrad = ctx.createRadialGradient(-1*s, -1*s, 1, -1*s, -1*s, 7*s);
  headGrad.addColorStop(0, shade(body, +25));
  headGrad.addColorStop(1, body);
  ctx.fillStyle = headGrad;
  ctx.beginPath();
  ctx.ellipse(0, 0, 5.5*s, 4.5*s, -0.25, 0, Math.PI*2);
  ctx.fill();

  // Front (chanfrein)
  ctx.fillStyle = shade(body, +10);
  ctx.beginPath();
  ctx.ellipse(-3.5*s, -1*s, 2.5*s, 4*s, -0.2, 0, Math.PI*2);
  ctx.fill();

  // Naseau
  ctx.fillStyle = shade(body, -30);
  ctx.beginPath();
  ctx.ellipse(-6.5*s, 1.5*s, 2.8*s, 2*s, -0.1, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#6B1010';
  ctx.beginPath();
  ctx.ellipse(-7.2*s, 1.8*s, 1.2*s, 0.8*s, 0, 0, Math.PI*2);
  ctx.fill();

  // Bouche
  ctx.strokeStyle = shade(body, -40);
  ctx.lineWidth = 1*s;
  ctx.beginPath();
  ctx.moveTo(-5*s, 3.5*s); ctx.lineTo(-7.5*s, 3.5*s);
  ctx.stroke();

  // Oeil
  ctx.fillStyle = '#0D0D0D';
  ctx.beginPath(); ctx.arc(2*s, -1.5*s, 2*s, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#2A1800';
  ctx.beginPath(); ctx.arc(2*s, -1.5*s, 1.4*s, 0, Math.PI*2); ctx.fill();
  // Reflet oeil
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.beginPath(); ctx.arc(2.7*s, -2.1*s, 0.6*s, 0, Math.PI*2); ctx.fill();

  // Oreille
  ctx.fillStyle = body;
  ctx.beginPath();
  ctx.moveTo(3*s, -4*s); ctx.lineTo(5.5*s, -9*s); ctx.lineTo(6.5*s, -5*s); ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#FF8080';
  ctx.beginPath();
  ctx.moveTo(3.5*s, -4.5*s); ctx.lineTo(5.2*s, -8*s); ctx.lineTo(5.8*s, -5*s); ctx.closePath();
  ctx.fill();

  // Licou
  ctx.strokeStyle = 'rgba(120,60,0,0.7)';
  ctx.lineWidth = 1.2*s;
  ctx.beginPath();
  ctx.moveTo(-6*s, 0); ctx.lineTo(4*s, 0);
  ctx.moveTo(0*s, -3*s); ctx.lineTo(0*s, 3*s);
  ctx.stroke();

  ctx.restore(); // fin tête+cou

  // ── JOCKEY ──────────────────────────────────────────────────────────────
  ctx.save();
  ctx.translate(-6*s, -24*s);
  ctx.rotate(-0.45); // penché vers l'avant

  // Shorts (culotte)
  ctx.fillStyle = shade(silk, -30);
  ctx.beginPath();
  ctx.ellipse(0, 4*s, 4*s, 3.5*s, 0, 0, Math.PI*2);
  ctx.fill();

  // Torse casaque
  const silkGrad = ctx.createLinearGradient(-5*s, -8*s, 5*s, 4*s);
  silkGrad.addColorStop(0, shade(silk, +20));
  silkGrad.addColorStop(1, shade(silk, -20));
  ctx.fillStyle = silkGrad;
  ctx.beginPath();
  ctx.ellipse(0, -2*s, 5*s, 6.5*s, 0, 0, Math.PI*2);
  ctx.fill();

  // Motif casaque (bande horizontale)
  ctx.fillStyle = trim;
  ctx.fillRect(-5*s, -4*s, 10*s, 2.5*s);
  ctx.globalAlpha = 0.7;
  ctx.fillRect(-5*s, 0*s, 10*s, 1.5*s);
  ctx.globalAlpha = 1;

  // Bras gauche (rênes)
  ctx.strokeStyle = shade(silk, -15);
  ctx.lineWidth = 3*s;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-4*s, 0*s);
  ctx.quadraticCurveTo(-8*s, 4*s, -12*s, 2*s);
  ctx.stroke();

  // Bras droit (cravache)
  ctx.beginPath();
  ctx.moveTo(3*s, 0*s);
  ctx.quadraticCurveTo(7*s, -3*s, 9*s, -1*s);
  ctx.stroke();
  // Cravache
  ctx.strokeStyle = '#4A2800';
  ctx.lineWidth = 1*s;
  ctx.beginPath();
  ctx.moveTo(9*s, -1*s); ctx.lineTo(14*s, -6*s);
  ctx.stroke();

  // Rênes
  ctx.strokeStyle = 'rgba(60,30,0,0.6)';
  ctx.lineWidth = 1*s;
  ctx.setLineDash([2*s, 2*s]);
  ctx.beginPath();
  ctx.moveTo(-12*s, 2*s); ctx.lineTo(-20*s, 6*s);
  ctx.stroke();
  ctx.setLineDash([]);

  // Toque
  const toqueGrad = ctx.createLinearGradient(-5*s, -16*s, 5*s, -10*s);
  toqueGrad.addColorStop(0, shade(cap, +20));
  toqueGrad.addColorStop(1, cap);
  ctx.fillStyle = toqueGrad;
  ctx.beginPath();
  ctx.arc(0, -12*s, 5*s, Math.PI, 0, false);
  ctx.fill();
  // Visière
  ctx.fillStyle = shade(cap, -15);
  ctx.beginPath();
  ctx.rect(-5.5*s, -11*s, 11*s, 3*s);
  ctx.fill();
  // Jugulaire
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.lineWidth = 1*s;
  ctx.beginPath();
  ctx.arc(0, -12*s, 5*s, 0, Math.PI * 0.7, false);
  ctx.stroke();

  // Visage
  ctx.fillStyle = '#D4956A';
  ctx.beginPath(); ctx.arc(0, -8*s, 3*s, 0, Math.PI*2); ctx.fill();
  // Lunettes
  ctx.fillStyle = 'rgba(255,220,100,0.5)';
  ctx.beginPath(); ctx.ellipse(-1*s, -9*s, 3*s, 1.8*s, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 0.8*s;
  ctx.beginPath(); ctx.ellipse(-1*s, -9*s, 3*s, 1.8*s, 0, 0, Math.PI*2); ctx.stroke();

  // Numéro sur casaque
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.font = `bold ${5.5*s}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.restore(); // fin jockey
  ctx.restore(); // fin corps+spine

  // ── JAMBES AVANT (au-dessus du corps) ──────────────────────────────────────
  drawLeg(ox - 16*s, oy + 10*s, f.fl, legLen, darkBody, legW, s);
  drawLeg(ox - 10*s, oy + 10*s, f.fr, legLen, midBody,  legW, s);
}

// ── FOND ─────────────────────────────────────────────────────────────────────
let bgOff = 0;

// ── BACKGROUND PHOTO (PNG hippodrome) ─────────────────────────────────────────
// Switch automatique selon la discipline. Lisible via l'URL pour le futur
// câblage avec le jeu :  race_v3.html?discipline=trot
const BG_SRC = {
  plat:     './bg_longchamp.png.webp',   // Plat       → Longchamp
  trot:     './bg_vincennes.png.webp',   // Trot       → Vincennes
  obstacle: './bg_auteuil.png.webp',     // Obstacles  → Auteuil
  default:  './bg_chantilly.png.webp',   // défaut     → Chantilly
};
function pickDiscipline() {
  const p = new URLSearchParams(location.search);
  const raw = (p.get('discipline') || p.get('disc') || '').toLowerCase();
  if (raw.includes('plat')) return 'plat';
  if (raw.includes('trot')) return 'trot';
  if (raw.includes('obst')) return 'obstacle';
  return 'default';
}
const DISCIPLINE = pickDiscipline();
let bgReady = false;
const bgImg = new Image();
bgImg.onload  = () => { bgReady = true; if (!raceRunning) drawBg(0); };
bgImg.onerror = () => { bgReady = false; };  // fallback : fond procédural d'origine
bgImg.src = BG_SRC[DISCIPLINE] || BG_SRC.default;

// Nouveau drawBg : la photo si elle est chargée (+ effets de piste par-dessus),
// sinon le moteur procédural d'origine — intact. On build par-dessus, on ne
// casse rien.
function drawBg(corner) {
  if (bgReady) {
    drawBgImage();
    drawTrackFX(corner);
  } else {
    drawBgProcedural(corner);
  }
}

// Photo STATIQUE (ciel + tribune) : calée en hauteur, centrée, ne défile plus.
// C'est le SOL animé (drawTrackFX) qui porte toute la sensation de vitesse.
function drawBgImage() {
  const dw = H * (bgImg.width / bgImg.height);   // largeur image calée sur la hauteur du canvas
  ctx.drawImage(bgImg, (W - dw) / 2, 0, dw, H);  // centrée, immobile
}

// ── SOL ANIMÉ (couche entre le PNG statique et les chevaux) ───────────────────
// Bande du bas : herbe rayée (plat/obstacle/défaut) ou sable (trot/Vincennes) qui
// défile de droite à gauche à la vitesse de la course → sensation de vitesse au
// sol pendant que le ciel reste fixe. Rail blanc fixe au bord supérieur. Léger
// motion blur des rayures en sprint final.
function drawTrackFX(corner) {
  const top = HORIZON;                                  // bord supérieur du sol
  const sprint = progress > 0.86 ? (progress - 0.86) / 0.14 : 0;
  if (DISCIPLINE === 'trot') drawSand(top, sprint);
  else drawGrass(top, sprint);

  // Rail : ligne blanche horizontale FIXE (séparation décor / piste).
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';           // halo
  ctx.lineWidth = 6;
  ctx.beginPath(); ctx.moveTo(0, top); ctx.lineTo(W, top); ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,0.9)';
  ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(0, top); ctx.lineTo(W, top); ctx.stroke();
}

// Herbe tondue : vert clair (fond) + rayures verticales vert foncé qui défilent.
function drawGrass(top, sprint) {
  const gH = H - top;
  const g = ctx.createLinearGradient(0, top, 0, H);     // dégradé de profondeur
  g.addColorStop(0, '#2E8038'); g.addColorStop(1, '#1A5622');
  ctx.fillStyle = g; ctx.fillRect(0, top, W, gH);

  const sw = 46, period = sw * 2, scroll = bgOff * 2.4; // défile à gauche à la vitesse de la course
  const passes = sprint > 0 ? 3 : 1;                    // passes fantômes = motion blur en sprint
  ctx.fillStyle = '#16441C';
  for (let p = 0; p < passes; p++) {
    ctx.globalAlpha = p === 0 ? 0.5 : 0.5 * 0.45 * sprint;
    const off = scroll + p * (10 + sprint * 20);        // léger smear horizontal
    let x = -(((off % period) + period) % period);
    for (; x < W + sw; x += period) ctx.fillRect(x, top, sw, gH);
  }
  ctx.globalAlpha = 1;
}

// Sable (trot/Vincennes) : beige + fines stries claires/sombres qui défilent.
function drawSand(top, sprint) {
  const gH = H - top;
  const g = ctx.createLinearGradient(0, top, 0, H);
  g.addColorStop(0, '#D8C291'); g.addColorStop(1, '#B6975F');
  ctx.fillStyle = g; ctx.fillRect(0, top, W, gH);

  const period = 60, scroll = bgOff * 2.2;
  const passes = sprint > 0 ? 2 : 1;
  for (let p = 0; p < passes; p++) {
    ctx.globalAlpha = (p === 0 ? 1 : sprint) * 0.55;
    const off = scroll + p * (8 + sprint * 16);
    let x = -(((off % period) + period) % period);
    for (; x < W + period; x += period) {
      ctx.fillStyle = 'rgba(255,242,205,0.22)'; ctx.fillRect(x, top, 3, gH);
      ctx.fillStyle = 'rgba(110,82,45,0.16)';  ctx.fillRect(x + period * 0.5, top, 2, gH);
    }
  }
  ctx.globalAlpha = 1;
}

function drawBgProcedural(corner) {
  // Ciel gradué
  const sky = ctx.createLinearGradient(0, 0, 0, HORIZON);
  sky.addColorStop(0, '#0B1E35');
  sky.addColorStop(0.5, '#1A4868');
  sky.addColorStop(1, '#2E7FA8');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, HORIZON);

  // Soleil bas (ambiance fin d'après-midi)
  const sunX = W * 0.75, sunY = HORIZON * 0.4;
  const sunGrad = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 80);
  sunGrad.addColorStop(0, 'rgba(255,220,100,0.35)');
  sunGrad.addColorStop(0.4, 'rgba(255,140,50,0.12)');
  sunGrad.addColorStop(1, 'rgba(255,100,30,0)');
  ctx.fillStyle = sunGrad;
  ctx.fillRect(0, 0, W, HORIZON);

  // Nuages
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  const clouds = [[120,30,55,14],[280,18,70,18],[420,35,45,12],[600,22,80,16],[720,28,50,13]];
  clouds.forEach(([cx,cy,rx,ry]) => {
    const px = ((cx - bgOff * 0.15) % (W+120)) - 60;
    ctx.beginPath(); ctx.ellipse(px, cy, rx, ry, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(px+30, cy-6, rx*0.65, ry*0.8, 0, 0, Math.PI*2); ctx.fill();
  });

  // Tribune — structure + foule
  const tribY = HORIZON - H * 0.18;
  const tribH = H * 0.18;

  // Fond tribune
  ctx.fillStyle = 'rgba(30,50,80,0.5)';
  ctx.fillRect(0, tribY, W, tribH);

  // Gradins (lignes horizontales)
  for (let g = 0; g < 6; g++) {
    const gy = tribY + tribH * (g / 6);
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
  }

  // Colonnes tribune
  for (let c = 0; c < 16; c++) {
    const cx = ((bgOff * 0.7 + c * 56) % (W + 56)) - 28;
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(cx, tribY); ctx.lineTo(cx, HORIZON); ctx.stroke();
  }

  // Foule — points colorés denses
  const crowd = ['rgba(220,50,50,0.65)','rgba(50,100,220,0.65)','rgba(220,200,50,0.55)','rgba(50,180,80,0.55)','rgba(220,100,220,0.5)','rgba(255,255,255,0.4)','rgba(200,150,50,0.55)','rgba(80,180,220,0.5)'];
  for (let i = 0; i < 200; i++) {
    const seed = i * 73.491;
    const px = ((seed * 5.3 - bgOff * 0.5) % W + W) % W;
    const py = tribY + 6 + (seed % (tribH * 0.8));
    ctx.fillStyle = crowd[i % crowd.length];
    ctx.beginPath(); ctx.arc(px, py, 2.2, 0, Math.PI*2); ctx.fill();
  }

  // Toit tribune (ligne lumineuse)
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, tribY); ctx.lineTo(W, tribY); ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 8;
  ctx.beginPath(); ctx.moveTo(0, tribY); ctx.lineTo(W, tribY); ctx.stroke();

  // Rail supérieur avec lumière
  ctx.strokeStyle = 'rgba(255,255,255,0.8)';
  ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(0, HORIZON); ctx.lineTo(W, HORIZON); ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 8;
  ctx.beginPath(); ctx.moveTo(0, HORIZON); ctx.lineTo(W, HORIZON); ctx.stroke();

  // ── PISTE ─────────────────────────────────────────────────────────────────
  // Effet virage : skew léger du fond de piste
  const skew = corner * 0.04;
  ctx.save();
  if (Math.abs(skew) > 0.001) ctx.transform(1, 0, skew, 1, 0, 0);

  // Dégradé piste (perspective — plus sombre au fond)
  const trackGrad = ctx.createLinearGradient(0, HORIZON, 0, H);
  trackGrad.addColorStop(0.00, '#1A4A20');
  trackGrad.addColorStop(0.15, '#226B2A');
  trackGrad.addColorStop(0.30, '#2D8036');
  trackGrad.addColorStop(0.50, '#2D8036');
  trackGrad.addColorStop(0.65, '#226B2A');
  trackGrad.addColorStop(0.85, '#1E5E24');
  trackGrad.addColorStop(1.00, '#163F18');
  ctx.fillStyle = trackGrad;
  ctx.fillRect(0, HORIZON, W, H - HORIZON);

  // Rayures de piste (défilent)
  const sw = 44;
  for (let i = 0; i < Math.ceil(W / sw) + 2; i++) {
    const sx = ((bgOff * 2.2 + i * sw) % (W + sw)) - sw;
    if (i % 2 === 0) {
      ctx.fillStyle = 'rgba(0,0,0,0.07)';
      ctx.fillRect(sx, HORIZON, sw, H - HORIZON);
    }
  }

  // Lignes de perspective (vanishing lines)
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 1;
  const vp = {x: W/2, y: HORIZON};
  for (let vl = 0; vl < 8; vl++) {
    const bx = (vl / 7) * W;
    ctx.beginPath(); ctx.moveTo(vp.x, vp.y); ctx.lineTo(bx, H); ctx.stroke();
  }

  ctx.restore();

  // Rail inférieur
  ctx.strokeStyle = 'rgba(255,255,255,0.75)';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, H*0.96); ctx.lineTo(W, H*0.96); ctx.stroke();

  // Poteaux rail (piste)
  for (let p = 0; p < 14; p++) {
    const px = ((bgOff * 3.5 + p * 62) % (W + 62)) - 31;
    ctx.strokeStyle = 'rgba(255,255,255,0.55)';
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(px, HORIZON+2); ctx.lineTo(px, HORIZON+12); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px, H*0.94); ctx.lineTo(px, H*0.99); ctx.stroke();
  }
}

function drawFinishLine(pRace) {
  if (pRace < 0.65) return;
  // La ligne d'arrivée entre dans le champ depuis la droite
  const t = (pRace - 0.65) / 0.35;
  const fx = W * 0.92 - (1 - Math.min(1, t * 1.4)) * W * 0.7;
  if (fx > W) return;

  const sqH = 13;
  const flH = H - HORIZON;
  const cols = Math.ceil(flH / sqH);
  for (let i = 0; i < cols; i++) {
    ctx.fillStyle = i % 2 === 0 ? 'white' : 'black';
    ctx.fillRect(fx - 5, HORIZON + i * sqH, 10, sqH);
  }
  // Poteau
  ctx.strokeStyle = 'white';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(fx, HORIZON - 30); ctx.lineTo(fx, HORIZON);
  ctx.stroke();
  // Drapeau
  ctx.fillStyle = '#C9A84C';
  ctx.beginPath();
  ctx.moveTo(fx, HORIZON - 28); ctx.lineTo(fx + 20, HORIZON - 22); ctx.lineTo(fx, HORIZON - 16);
  ctx.closePath(); ctx.fill();
}

// Stalles de départ — visibles au tout début, glissent vers la gauche puis s'effacent.
function drawStartGates(p) {
  if (p > 0.06) return;
  ctx.save();
  ctx.globalAlpha = 1 - p / 0.06;
  ctx.strokeStyle = 'rgba(225,225,235,0.9)';
  ctx.lineWidth = 2;
  for (let i = 0; i < RUNNERS.length; i++) {
    const y  = LANES[i] * H;
    const sc = 0.55 + laneDepth(LANES[i]) * 0.62;
    const gx = CAM_LEAD * W + 34 - p * 220;        // la barrière recule vers la gauche
    ctx.strokeRect(gx - 6*sc, y - 18*sc, 13*sc, 32*sc);
    ctx.beginPath(); ctx.moveTo(gx - 6*sc, y - 18*sc); ctx.lineTo(gx + 7*sc, y - 18*sc); ctx.stroke();
  }
  ctx.restore();
}

// ── PARTICULES DE POUSSIÈRE ──────────────────────────────────────────────────
const dustParticles = [];
function spawnDust(x, y, color) {
  for (let i = 0; i < 2; i++) {
    dustParticles.push({
      x, y: y + (Math.random() - 0.5) * 6,
      vx: -(1 + Math.random() * 2),
      vy: -(0.5 + Math.random()),
      r: 1.5 + Math.random() * 2.5,
      alpha: 0.4 + Math.random() * 0.3,
      color,
    });
  }
}
function updateDust() {
  for (let i = dustParticles.length - 1; i >= 0; i--) {
    const d = dustParticles[i];
    d.x += d.vx; d.y += d.vy; d.vy += 0.05;
    d.r  *= 1.04; d.alpha *= 0.88;
    if (d.alpha < 0.02) { dustParticles.splice(i, 1); continue; }
    ctx.fillStyle = `rgba(180,140,60,${d.alpha})`;
    ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2); ctx.fill();
  }
}

// ── ÉTAT COURSE ───────────────────────────────────────────────────────────────
let progress = 0, gameSpeed = 1, raceRunning = false, raceEnded = false;
let lastTime = 0, frameCount = 0, bgOff2 = 0;

const PHASES = [
  { pct:0.00, label:'Départ',          comment:'Les partants s\'élancent des starting-gates !' },
  { pct:0.22, label:'1er virage',      comment:'Premier virage — le peloton se resserre, Premier Galop en embuscade.' },
  { pct:0.45, label:'Ligne dos',       comment:'Ligne droite dos — Premier Galop remonte, bonne position !' },
  { pct:0.72, label:'Virage final',    comment:'Virage final ! Tout se joue maintenant, le peloton s\'élance !' },
  { pct:0.90, label:'Ligne d\'arrivée',comment:'⚡ Dernière ligne droite — Premier Galop donne tout !' },
];
let phaseIdx = 0;
let _lastComment = '';
let _liveRows = null;                                  // nœuds DOM du classement (réutilisés)

// Pari : câblable par le jeu (window.RACE_BET) ou via URL ?bet=10&odds=3.5&place=1
const BET = (() => {
  if (window.RACE_BET) return window.RACE_BET;
  const q = new URLSearchParams(location.search);
  if (!q.get('bet')) return null;
  // net = gain/perte net pré-calculé par le jeu (fait foi pour l'affichage) ; sinon déduit.
  return {
    amount: +q.get('bet') || 0, odds: +q.get('odds') || 1, place: +q.get('place') || 1,
    net: q.get('betnet') != null ? +q.get('betnet') : null,
  };
})();
// Photo-finish forcé pour démo/test (?photo=1) ; le jeu peut aussi viser window.RACE_PHOTO.
const PHOTO_FORCED = new URLSearchParams(location.search).get('photo') === '1';

// Commentaire dramatique du sprint final (gated : pas d'écriture DOM à chaque frame).
function maybeDramaComment() {
  if (progress <= 0.86 || progress >= 1) return;
  const stand = RUNNERS.map(r => ({ r, s: runnerS(r, progress) })).sort((a, b) => b.s - a.s);
  const lead = stand[0].r, second = stand[1].r;
  const gap = (stand[0].s - stand[1].s) / GAP_PER_POS;
  const me = RUNNERS.find(r => r.isPlayer);
  let txt;
  if (gap < 0.5)                                       txt = `📸 Photo-finish en vue ! ${lead.name} et ${second.name} au coude-à-coude !`;
  else if (lead.isPlayer)                              txt = `⚡ ${me.name} s'envole vers la victoire !`;
  else if (stand.slice(0, 3).some(e => e.r.isPlayer))  txt = `⚡ ${me.name} lutte pour le podium dans la dernière ligne !`;
  else                                                 txt = `${lead.name} file en tête, ${me.name} tente tout !`;
  if (txt !== _lastComment) { _lastComment = txt; document.getElementById('comment').textContent = txt; }
}

function setSpeed(s) {
  gameSpeed = s;
  [1,2,4].forEach(v => document.getElementById('spd'+v).className='btn-speed'+(v===s?' active':''));
}

function gameLoop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  if (raceRunning && !raceEnded) {
    // Vitesse de course variable : burst de départ, ralenti en virage, sprint final.
    const cvNow = cornerAmt(progress);
    const phaseMul = (progress < 0.05) ? (0.2 + progress / 0.05 * 0.8)
                   : (progress > 0.86) ? 1.30 : 1.0;
    const dp = dt * 0.013 * gameSpeed * phaseMul;
    progress = Math.min(1, progress + dp);
    // bgOff = déplacement du sol ; ~170px/s @x1 (0.013*13000), ralentit en virage.
    bgOff += dp * 13000 * (1 - cvNow * 0.20);
    frameCount += dt * 14 * gameSpeed;                 // cadence galop inchangée

    document.getElementById('prog-fill').style.width = (progress * 100).toFixed(1) + '%';
    maybeDramaComment();

    // Phase
    let newPhase = phaseIdx;
    for (let i = PHASES.length - 1; i >= 0; i--) {
      if (progress >= PHASES[i].pct) { newPhase = i; break; }
    }
    if (newPhase !== phaseIdx) {
      phaseIdx = newPhase;
      setPhaseUI(phaseIdx);
    }

    if (progress >= 1) { raceEnded = true; endRace(); }
  }

  renderFrame();
  requestAnimationFrame(gameLoop);
}

// Dessine UNE frame (fond + chevaux + effets) sans modifier l'état ni relancer
// la boucle. Réutilisable pour un rendu figé (?frame=) ou un poster de course.
function renderFrame() {
  _leaderS = leaderS(progress);          // cache leader 1×/frame (caméra + classement)
  const cv = cornerAmt(progress);
  drawBg(cv);
  drawFinishLine(progress);
  drawStartGates(progress);
  updateDust();

  // Ordre de dessin = profondeur (précalculé, LANES constant)
  const sorted = DRAW_ORDER;

  sorted.forEach(({r,i}) => {
    const xPct = runnerXPct(r, progress);
    const yPct = LANES[i];

    const px = xPct * W;
    const py = yPct * H;

    // Scale selon profondeur (loin≈0.55 .. proche≈1.17)
    const depth = laneDepth(yPct);
    const sc = (0.55 + depth * 0.62) * (r.isPlayer ? 1.08 : 1.0);

    // Inclinaison virage : 3-5° vers l'intérieur, sens opposé V1 vs V2.
    const tilt = cv * (4.5 * Math.PI / 180) * (progress < 0.5 ? 1 : -1);

    // Motion blur horizontal : montée progressive dans le sprint final.
    const sprint = progress > 0.86 ? (progress - 0.86) / 0.14 : 0;
    const blur = (sprint > 0 && raceRunning) ? (0.6 + sprint * 0.8) * Math.min(1, gameSpeed / 2) : 0;

    // Ombre
    ctx.save();
    ctx.globalAlpha = 0.18 + depth * 0.12;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(px - 3*sc, py + 4*sc, 22*sc, 5*sc, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // Poussière (premier plan) — boost au départ (explosion des stalles).
    const departBoost = progress < 0.04 ? 4 : 1;
    if (raceRunning && depth > 0.5 && Math.random() < 0.15 * gameSpeed * departBoost) {
      spawnDust(px - 10*sc, py + 14*sc, r.body);
    }

    // Cheval (fog = voile de profondeur ; tilt = inclinaison virage)
    const fog = (1 - depth) * 0.32;
    drawHorse(px, py, sc, Math.floor(frameCount + i * 1.7), r.body, r.silk, r.cap, r.trim, r.isPlayer, blur, fog, tilt);

    // Numéro dossard (visible au premier plan)
    if (depth > 0.4) {
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.beginPath();
      ctx.roundRect(px - 8*sc, py - 28*sc, 16*sc, 12*sc, 3*sc);
      ctx.fill();
      ctx.fillStyle = 'white';
      ctx.font = `bold ${9*sc}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(r.id, px, py - 22*sc);
      ctx.restore();
    }

    // Halo joueur
    if (r.isPlayer && raceRunning) {
      ctx.save();
      ctx.globalAlpha = 0.25 + Math.sin(Date.now() * 0.004) * 0.1;
      ctx.strokeStyle = '#C9A84C';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(px, py, 30*sc, 16*sc, 0, 0, Math.PI*2);
      ctx.stroke();
      ctx.restore();
    }
  });

  // Live UI
  if (raceRunning) updateLive();
}

function setPhaseUI(idx) {
  for (let i = 0; i < 5; i++) {
    document.getElementById('ph'+i).className =
      'phase-dot' + (i < idx ? ' done' : i===idx ? ' active' : '');
  }
  document.getElementById('phase-label').textContent = PHASES[idx].label;
  // Le dernier segment laisse la main au commentaire dramatique (maybeDramaComment).
  if (idx < PHASES.length - 1) {
    _lastComment = PHASES[idx].comment;
    document.getElementById('comment').textContent = _lastComment;
  }
}

// Construit les 10 lignes du classement UNE fois ; on les réutilise ensuite.
function buildLiveRows() {
  const list = document.getElementById('live-list');
  list.innerHTML = '';
  _liveRows = {};
  RUNNERS.forEach(r => {
    const row = document.createElement('div');
    row.className = 'live-runner';
    row.innerHTML =
      `<div class="live-num" style="background:${r.silk};color:white">${r.id}</div>` +
      `<div class="live-name">${r.name}${r.isPlayer ? ' ★' : ''}</div>` +
      `<div class="live-pos"></div>` +
      `<div class="live-bar-bg"><div class="live-bar-fill" style="background:${r.silk}"></div></div>`;
    row._pos = row.querySelector('.live-pos');
    row._bar = row.querySelector('.live-bar-fill');
    _liveRows[r.id] = row;
    list.appendChild(row);
  });
}

// Met à jour le top 6 SANS réécrire l'innerHTML : on mute les nœuds existants et on
// les réordonne par appendChild (déplace le nœud → la transition CSS de barre survit).
function updateLive() {
  if (!_liveRows) buildLiveRows();
  const list = document.getElementById('live-list');
  const stand = RUNNERS.map(r => ({ r, s: runnerS(r, progress) })).sort((a, b) => b.s - a.s);
  const lead = _leaderS || (stand[0] && stand[0].s) || 1;
  stand.forEach((e, rank) => {
    const row = _liveRows[e.r.id];
    if (rank < 6) {
      row.style.display = '';
      row._pos.textContent = (rank + 1) + 'e';
      row._bar.style.width = Math.round(Math.max(0.05, Math.min(1, e.s / lead)) * 100) + '%';
      list.appendChild(row);               // réordonne sans recréer le nœud
    } else {
      row.style.display = 'none';
    }
  });
}

function endRace() {
  raceRunning = false;
  const photo = isPhotoFinish();
  const show = () => renderResult(photo);
  if (photo) runPhotoFinishFlash(show); else show();
}

// Photo-finish : écart gagnant < 0.5 longueur au poteau (p=1, shuffle=0).
// Photo-finish : forcé par le jeu (window.RACE_PHOTO / ?photo=1) ou écart gagnant réel
// < 0.5 longueur. Le champ standalone par défaut (rangs entiers, écart = 1 longueur)
// n'en déclenche pas seul — c'est le jeu parent (marges serrées) ou l'override qui l'arme.
function isPhotoFinish() {
  if (PHOTO_FORCED || window.RACE_PHOTO) return true;
  const s = RUNNERS.map(r => runnerS(r, 1)).sort((a, b) => b - a);
  return (s[0] - s[1]) < GAP_PER_POS * 0.5;
}

// Flash blanc + libellé « PHOTO FINISH » (one-shot). Filet de sécurité setTimeout :
// le résultat s'affiche même si requestAnimationFrame est throttlé (onglet caché).
function runPhotoFinishFlash(done) {
  const t0 = performance.now();
  let finished = false;
  const finish = () => { if (!finished) { finished = true; done(); } };
  (function flash(now) {
    const k = (now - t0) / 800;
    renderFrame();
    ctx.fillStyle = `rgba(255,255,255,${Math.max(0, 0.55 * (1 - k))})`;
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 26px Arial'; ctx.textAlign = 'center';
    ctx.fillText('PHOTO FINISH', W / 2, H * 0.26);
    if (k < 1) requestAnimationFrame(flash); else finish();
  })(t0);
  setTimeout(finish, 1200);
}

function renderResult(photo) {
  const order  = [...RUNNERS].sort((a, b) => runnerS(b, 1) - runnerS(a, 1));  // = ordre .pos final
  const me     = RUNNERS.find(r => r.isPlayer);
  const myRank = order.findIndex(r => r.isPlayer) + 1;
  const podCell = r => `<span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:${r.silk};margin-bottom:3px;"></span><br>${r.name}${r.isPlayer ? ' ★' : ''}`;

  document.getElementById('res-title').innerHTML =
    (photo ? '<span class="photo-badge">PHOTO FINISH</span><br>' : '') +
    (myRank === 1 ? '🏆 VICTOIRE !' : 'Arrivée');
  document.getElementById('pod1').innerHTML = '🥇<br>' + podCell(order[0]);
  document.getElementById('pod2').innerHTML = '🥈<br>' + podCell(order[1]);
  document.getElementById('pod3').innerHTML = '🥉<br>' + podCell(order[2]);
  document.getElementById('res-player').textContent = `${me.name} : ${myRank}ᵉ / ${RUNNERS.length}`;

  const money = document.getElementById('res-money');
  if (BET && BET.amount > 0) {
    // net pré-calculé par le jeu si fourni, sinon déduit (mode standalone).
    const net = (BET.net != null) ? BET.net
              : (myRank <= (BET.place || 1) ? Math.round(BET.amount * BET.odds - BET.amount) : -BET.amount);
    const won = net > 0;
    money.textContent = won ? `🎰 Pari gagné : +${net} €` : `🎰 Pari perdu : ${net} €`;
    money.style.color = won ? '#4CD08A' : '#E06A6A';
  } else { money.textContent = ''; }

  document.getElementById('result').classList.add('show');
  document.getElementById('res-continue').onclick = continueRace;
}

// Continuer : câblable par le jeu parent (postMessage / window.onRaceContinue), sinon reset.
function continueRace() {
  const order = [...RUNNERS].sort((a, b) => runnerS(b, 1) - runnerS(a, 1));
  const payload = { playerRank: order.findIndex(r => r.isPlayer) + 1, order: order.map(r => ({ id: r.id, name: r.name })) };
  if (window.parent !== window) window.parent.postMessage({ type: 'race-done', ...payload }, '*');
  if (typeof window.onRaceContinue === 'function') { window.onRaceContinue(payload); return; }
  location.reload();
}

function startRace() {
  raceRunning = true;
  document.getElementById('btn-start').style.display = 'none';
  setPhaseUI(0);
  requestAnimationFrame(ts => { lastTime = ts; gameLoop(ts); });
}

// Init statique
drawBg(0);
updateLive();

// ── MODES PREVIEW / CÂBLAGE (lus dans l'URL) ──────────────────────────────────
const _params = new URLSearchParams(location.search);

// En-tête de course alimenté par le jeu (?racename, ?track, ?distance, ?grade)
// — remplace le « Prix des Poulinieres / Chantilly » codé en dur.
(function () {
  const name = _params.get('racename'), track = _params.get('track'),
        dist = _params.get('distance'), grade = _params.get('grade');
  if (name) document.querySelector('.race-name').textContent = name;
  if (track || dist) {
    const bits = [];
    if (track) bits.push('📍 ' + track);
    if (dist) bits.push(dist);
    bits.push(RUNNERS.length + ' partants');
    document.querySelector('.race-meta').textContent = bits.join(' • ');
  }
  if (grade) document.querySelector('.race-grade').textContent = grade;
})();

// Rendu d'une frame figée, sans boucle :  race_v3.html?frame=0.5
const _frame = _params.get('frame');
if (_frame !== null) {
  const renderStaticFrame = () => {
    progress   = Math.max(0, Math.min(1, parseFloat(_frame) || 0));
    frameCount = progress * 200;        // pose de galop cohérente
    bgOff      = progress * 4000;       // décalage parallaxe cohérent
    let pidx = 0;
    for (let i = PHASES.length - 1; i >= 0; i--) { if (progress >= PHASES[i].pct) { pidx = i; break; } }
    setPhaseUI(pidx);
    raceRunning = true;                 // halo joueur + motion blur visibles
    renderFrame();
    raceRunning = false;
  };
  if (bgReady) renderStaticFrame();
  else { bgImg.addEventListener('load', renderStaticFrame); setTimeout(() => { if (!bgReady) renderStaticFrame(); }, 2000); }
}

// Vitesse initiale (le jeu passe ?speed=4 pour une course brève ~20s).
const _spd = parseFloat(_params.get('speed'));
if (_spd && [1, 2, 4].indexOf(_spd) >= 0) setSpeed(_spd);
else if (_spd) gameSpeed = Math.max(1, Math.min(4, _spd));

// Démarrage auto optionnel (preview / câblage iframe) :  race_v3.html?autostart=1
if (_params.get('autostart')) startRace();
</script>
